<style>
:root {
  --bg-cream: #FFF8E8;
  --bg-card: #FFFFFF;
  --ink: #2C2240;
  --ink-soft: #6B5F8B;
  --ink-mute: #A095BB;
  --line: #E8DCC4;
  --line-soft: #F2EBD9;

  --coral: #FF6B47;
  --coral-soft: #FFE4DC;
  --teal: #2BB6A6;
  --teal-soft: #D4F1ED;
  --gold: #F5B82E;
  --gold-soft: #FFF1D0;
  --pink: #FF6B9D;
  --pink-soft: #FFE0EC;
  --blue: #4A7AE8;
  --blue-soft: #DBE6FA;
  --purple: #8E66E0;
  --purple-soft: #E8DBFA;
  --green: #4FBE52;
  --green-soft: #DDF2DE;

  --tier-fire: #E63946;
  --tier-fire-soft: #FFD8DC;
  --tier-dia: #1D7CD9;
  --tier-dia-soft: #D4E8FA;
  --tier-gold: #F5A623;
  --tier-gold-soft: #FFEAC2;

  --shadow-soft: 0 2px 0 rgba(44,34,64,0.08), 0 8px 24px rgba(44,34,64,0.04);
  --shadow-pop: 0 4px 0 rgba(44,34,64,0.15);
  --shadow-press: 0 2px 0 rgba(44,34,64,0.15);

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;

  --font-display: 'Jua', sans-serif;
  --font-body: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-eng: 'Fredoka', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--bg-cream);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}
body {
  background:
    radial-gradient(circle at 10% 10%, var(--gold-soft) 0%, transparent 35%),
    radial-gradient(circle at 90% 90%, var(--coral-soft) 0%, transparent 35%),
    radial-gradient(circle at 90% 10%, var(--teal-soft) 0%, transparent 30%),
    var(--bg-cream);
  background-attachment: fixed;
}
#app {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 24px;
  position: relative;
}
.eng { font-family: var(--font-eng); font-weight: 500; }
h1, h2, h3 { font-family: var(--font-display); font-weight: 400; line-height: 1.2; }
h1 { font-size: 28px; }
h2 { font-size: 22px; }
h3 { font-size: 18px; }

/* Card */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow-soft);
  border: 2px solid var(--line);
  margin-bottom: 12px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 20px;
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  background: var(--bg-card);
  color: var(--ink);
  font-family: var(--font-display);
  font-size: 16px;
  cursor: pointer;
  box-shadow: var(--shadow-pop);
  transition: transform 0.1s, box-shadow 0.1s;
  user-select: none;
}
.btn:active {
  transform: translateY(2px);
  box-shadow: var(--shadow-press);
}
.btn-primary { background: var(--coral); color: white; }
.btn-blue { background: var(--blue); color: white; }
.btn-pink { background: var(--pink); color: white; }
.btn-teal { background: var(--teal); color: white; }
.btn-gold { background: var(--gold); color: var(--ink); }
.btn-green { background: var(--green); color: white; }
.btn-ghost {
  background: transparent;
  border: 1.5px solid var(--line);
  box-shadow: none;
  color: var(--ink-soft);
  font-family: var(--font-body);
  font-weight: 500;
}
.btn-ghost:active { transform: none; box-shadow: none; }
.btn-block { width: 100%; }
.btn-lg { padding: 18px 24px; font-size: 18px; }
.btn-sm { padding: 8px 14px; font-size: 14px; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mb-12 { margin-bottom: 12px; }

/* Header */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding: 4px 4px;
}
.back-btn {
  background: var(--bg-card);
  border: 1.5px solid var(--line);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--ink);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}
.app-title {
  font-family: var(--font-display);
  font-size: 18px;
  flex: 1;
  text-align: center;
}

/* Profile select */
.profile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 24px;
}
.profile-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 24px 16px;
  border: 2px solid var(--line);
  text-align: center;
  cursor: pointer;
  box-shadow: var(--shadow-pop);
  transition: transform 0.15s;
}
.profile-card:active { transform: translateY(2px); }
.profile-card.juhyuk { background: linear-gradient(180deg, var(--blue-soft), white 60%); }
.profile-card.jooha { background: linear-gradient(180deg, var(--pink-soft), white 60%); }
.profile-emoji {
  font-size: 60px;
  margin-bottom: 8px;
}
.profile-name {
  font-family: var(--font-display);
  font-size: 22px;
  margin-bottom: 4px;
}
.profile-meta {
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 4px;
}

/* Hero */
.hero {
  background: linear-gradient(180deg, white, var(--bg-cream));
  border-radius: var(--radius-lg);
  border: 2px solid var(--line);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-soft);
}
.hero-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.hero-emoji {
  width: 70px;
  height: 70px;
  background: var(--bg-cream);
  border-radius: 50%;
  border: 2px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  flex-shrink: 0;
}
.hero-info { flex: 1; }
.hero-name {
  font-family: var(--font-display);
  font-size: 20px;
}
.hero-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}
.stat {
  background: var(--bg-cream);
  padding: 8px;
  border-radius: var(--radius-sm);
  text-align: center;
}
.stat-label { color: var(--ink-mute); font-size: 10px; }
.stat-value { font-family: var(--font-display); font-size: 16px; margin-top: 2px; }

/* Level banner */
.level-banner {
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: white;
  border-radius: var(--radius-md);
  padding: 12px 14px;
  margin-top: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 2px solid var(--ink);
}
.level-info-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.level-icon { font-size: 22px; }
.level-text { font-family: var(--font-display); font-size: 14px; }
.level-num {
  background: var(--gold);
  color: var(--ink);
  padding: 4px 10px;
  border-radius: 999px;
  font-family: var(--font-display);
  font-size: 14px;
  border: 2px solid var(--ink);
}

/* Progress */
.progress-section { margin-top: 12px; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.progress-bar {
  height: 12px;
  background: var(--line-soft);
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid var(--line);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--coral), var(--gold));
  border-radius: 999px;
  transition: width 0.5s;
}

/* Today block */
.today-block {
  background: linear-gradient(135deg, #FF6B47, #F5B82E);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 14px;
  border: 2px solid var(--ink);
  box-shadow: var(--shadow-pop);
  color: white;
}
.today-block-tag {
  font-size: 11px;
  opacity: 0.9;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.today-block-title {
  font-family: var(--font-display);
  font-size: 24px;
  margin-top: 4px;
  margin-bottom: 4px;
}
.today-block-subtitle {
  font-size: 13px;
  opacity: 0.95;
  margin-bottom: 14px;
}
.today-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.today-action-btn {
  background: white;
  color: var(--ink);
  padding: 16px 10px;
  border-radius: 14px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-align: center;
  border: 2px solid white;
  transition: transform 0.1s;
}
.today-action-btn:active { transform: scale(0.96); }
.today-action-btn.urgent {
  background: var(--tier-fire);
  color: white;
  border-color: var(--tier-fire);
}
.today-action-btn.disabled {
  background: rgba(255,255,255,0.4);
  color: rgba(0,0,0,0.5);
  cursor: default;
  border-color: transparent;
}
.today-action-btn.disabled:active { transform: none; }
.today-action-icon { font-size: 30px; }
.today-action-label { font-family: var(--font-display); font-size: 14px; line-height: 1.2; }

/* Saturday banner */
.sat-banner {
  background: var(--gold);
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  padding: 14px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  box-shadow: var(--shadow-pop);
}
.sat-banner-icon { font-size: 32px; }
.sat-banner-text { flex: 1; }
.sat-banner-title { font-family: var(--font-display); font-size: 16px; }
.sat-banner-sub { font-size: 12px; color: var(--ink); opacity: 0.85; margin-top: 2px; }

/* Menu grid */
.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.menu-card {
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: var(--radius-md);
  padding: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-soft);
  transition: transform 0.15s;
}
.menu-card:active { transform: translateY(1px); }
.menu-icon { font-size: 28px; }
.menu-text { font-family: var(--font-display); font-size: 14px; line-height: 1.2; }
.menu-sub { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }

/* Word list */
.word-list-header {
  background: linear-gradient(135deg, var(--coral), var(--gold));
  color: white;
  padding: 16px;
  border-radius: var(--radius-md);
  border: 2px solid var(--ink);
  margin-bottom: 12px;
  text-align: center;
  box-shadow: var(--shadow-pop);
}
.word-day-num {
  font-family: var(--font-display);
  font-size: 22px;
}
.word-day-sub {
  font-size: 12px;
  opacity: 0.95;
  margin-top: 4px;
}
.word-list {
  background: white;
  border: 2px solid var(--line);
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: 14px;
}
.word-item {
  display: grid;
  grid-template-columns: 28px 1fr 1.4fr 36px;
  gap: 8px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--line-soft);
  align-items: center;
}
.word-item:last-child { border-bottom: none; }
.word-num {
  font-size: 11px;
  color: var(--ink-mute);
  font-weight: 600;
}
.word-eng {
  font-family: var(--font-eng);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
}
.word-kor {
  font-size: 13px;
  color: var(--ink-soft);
}
.speak-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--blue-soft);
  border: 1.5px solid var(--blue);
  color: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  transition: transform 0.1s;
}
.speak-btn:active { transform: scale(0.9); }
.speak-btn.playing {
  background: var(--blue);
  color: white;
  animation: pulse 0.6s;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* Test screen */
.test-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--ink-soft);
}
.test-progress {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
}
.test-progress-dot {
  flex: 1;
  height: 6px;
  background: var(--line-soft);
  border-radius: 999px;
}
.test-progress-dot.answered { background: var(--coral); }
.test-progress-dot.current { background: var(--gold); }

.test-question {
  background: white;
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  padding: 24px 16px;
  margin-bottom: 14px;
  text-align: center;
  box-shadow: var(--shadow-pop);
}
.test-q-type {
  display: inline-block;
  background: var(--coral-soft);
  color: var(--coral);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 999px;
  margin-bottom: 10px;
}
.test-q-prompt {
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 12px;
}
.test-q-word {
  font-family: var(--font-eng);
  font-size: 38px;
  font-weight: 600;
  color: var(--ink);
  margin: 8px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.test-q-word .speak-btn {
  width: 38px;
  height: 38px;
  font-size: 16px;
}
.test-q-meaning {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--ink);
  margin: 8px 0;
}
.test-q-sentence {
  font-family: var(--font-eng);
  font-size: 18px;
  color: var(--ink);
  line-height: 1.6;
  padding: 0 4px;
}
.test-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.test-option {
  background: white;
  border: 2px solid var(--line);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.1s;
  box-shadow: var(--shadow-soft);
}
.test-option:active { transform: translateY(1px); }
.test-option.selected {
  border-color: var(--coral);
  background: var(--coral-soft);
}
.test-option.review-correct {
  border-color: var(--green);
  background: var(--green-soft);
}
.test-option.review-wrong {
  border-color: var(--tier-fire);
  background: var(--tier-fire-soft);
}
.test-option-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg-cream);
  border: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
}
.test-option.selected .test-option-num {
  background: var(--coral);
  color: white;
  border-color: var(--coral);
}
.test-option-text {
  flex: 1;
  font-size: 15px;
}
.test-option-text.korean { font-family: var(--font-body); }
.test-option-text.english { font-family: var(--font-eng); font-weight: 500; }

/* Test review (제출 전 검토) */
.review-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}
.review-cell {
  aspect-ratio: 1;
  background: white;
  border: 2px solid var(--line);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.1s;
}
.review-cell:active { transform: scale(0.95); }
.review-cell.answered {
  background: var(--coral);
  color: white;
  border-color: var(--coral);
}
.review-cell.unanswered {
  background: var(--tier-fire-soft);
  color: var(--tier-fire);
  border-color: var(--tier-fire);
}

/* Result */
.result-hero {
  background: white;
  border: 2px solid var(--ink);
  border-radius: var(--radius-lg);
  padding: 24px 16px;
  text-align: center;
  margin-bottom: 14px;
  box-shadow: var(--shadow-pop);
}
.result-emoji { font-size: 60px; }
.result-score {
  font-family: var(--font-display);
  font-size: 48px;
  margin: 4px 0;
}
.result-status {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 999px;
  font-family: var(--font-display);
  font-size: 14px;
  margin: 8px 0 4px;
}
.result-status.pass { background: var(--green-soft); color: var(--green); }
.result-status.fail { background: var(--tier-fire-soft); color: var(--tier-fire); }
.result-msg { font-size: 13px; color: var(--ink-soft); }
.result-rewards {
  background: var(--gold-soft);
  border: 2px solid var(--gold);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 12px;
}
.result-rewards-title {
  font-family: var(--font-display);
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--ink);
}
.reward-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 4px 0;
}

/* History */
.week-block {
  background: white;
  border: 2px solid var(--line);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  overflow: hidden;
}
.week-header {
  background: var(--bg-cream);
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--line-soft);
}
.week-header-title {
  font-family: var(--font-display);
  font-size: 15px;
}
.week-header-info {
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 600;
}
.day-row {
  display: grid;
  grid-template-columns: 56px 1fr 1.3fr;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line-soft);
  align-items: center;
}
.day-row:last-child { border-bottom: none; }
.day-row.today { background: linear-gradient(90deg, var(--coral-soft) 0%, transparent 80%); }
.day-row-label {
  font-family: var(--font-display);
  font-size: 14px;
}
.day-row.today .day-row-label { color: var(--coral); }
.day-cell {
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  background: var(--bg-cream);
  border: 1px solid var(--line);
  justify-content: center;
}
.day-cell.score {
  background: white;
  font-weight: 600;
  justify-content: space-between;
}
.day-cell.action {
  background: var(--coral);
  color: white;
  border-color: var(--coral);
  font-weight: 600;
}
.day-cell.urgent {
  background: var(--tier-fire);
  color: white;
  border-color: var(--tier-fire);
}
.day-cell.muted {
  background: transparent;
  border: 1px dashed var(--line);
  color: var(--ink-mute);
  cursor: default;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 14px;
  z-index: 9999;
  animation: toastIn 0.3s;
  box-shadow: var(--shadow-pop);
}
@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, 20px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

/* Modal */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: white;
  border-radius: var(--radius-lg);
  padding: 24px;
  max-width: 360px;
  width: 100%;
  border: 2px solid var(--ink);
  text-align: center;
  box-shadow: var(--shadow-pop);
}
.modal-icon { font-size: 50px; margin-bottom: 8px; }
.modal-title { font-family: var(--font-display); font-size: 20px; margin-bottom: 6px; }
.modal-text { font-size: 13px; color: var(--ink-soft); margin-bottom: 16px; line-height: 1.5; }

/* Confetti */
.confetti-container {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 9997;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  animation: confettiFall 2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-soft);
}
.empty-icon { font-size: 48px; margin-bottom: 8px; }

/* Tier badges */
.tier-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
}
.tier-fire { background: var(--tier-fire-soft); color: var(--tier-fire); }
.tier-dia { background: var(--tier-dia-soft); color: var(--tier-dia); }
.tier-gold { background: var(--tier-gold-soft); color: var(--tier-gold); }

/* Print */
@media print {
  body { background: white; }
  #app { display: none; }
  #print-area { display: block !important; }
}
#print-area { display: none; }
.print-page { padding: 20px; font-family: 'Pretendard', sans-serif; }
.print-cover {
  text-align: center;
  padding: 14px;
  border-bottom: 2px solid #2C2240;
  margin-bottom: 14px;
}
.print-day-block { margin-bottom: 18px; page-break-inside: avoid; }
.print-day-title {
  background: #FFF1D0;
  padding: 8px 12px;
  font-weight: 700;
  border-radius: 6px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}
.print-word-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.print-word-table td {
  border-bottom: 1px solid #ddd;
  padding: 6px 8px;
}
.print-word-table .num { width: 28px; color: #999; }
.print-word-table .eng { font-weight: 500; width: 30%; }
.print-word-table .check { width: 24px; text-align: center; }
</style>

// ============================================================
// 시작일 설정 (수요일 = DAY 1)
// 첫 주: 수(D1), 목(D2), 금(D3) — 3일치
// 둘째 주부터: 월~금 5일치
// ============================================================
const START_DATE = '2026-05-04'; // 월요일 시작 — 5/6 수요일=D3, 5/7 목요일=D4

function getTodayDay() {
  const start = new Date(START_DATE + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffMs = today - start;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  if (diffDays < 0) return 0; // 시작 전

  // 5/4(월)부터 시작. 매주 월~금만 진행 (주 5일).
  // 0=월,1=화,2=수,3=목,4=금,5=토,6=일
  const fullWeeks = Math.floor(diffDays / 7);
  const dayInWeek = diffDays % 7;
  if (dayInWeek <= 4) {
    // 월~금
    return fullWeeks * 5 + dayInWeek + 1;
  } else {
    // 토/일 → 그 주 금요일 DAY 유지
    return fullWeeks * 5 + 5;
  }
}

// 오늘이 토요일인지 (보너스 시험 가능일)
function isSaturdayToday() {
  return new Date().getDay() === 6;
}

// 이번주 번호 — 5일치 단위 (DAY 1~5=1주차, 6~10=2주차, ...)
function getWeekNum(day) {
  return Math.ceil(day / 5);
}
function getWeekRange(weekNum) {
  const start = (weekNum - 1) * 5 + 1;
  return [start, start + 4];
}
function isWeekLastDay(day) {
  return day % 5 === 0;
}

}

// Firebase에서 최신 데이터 가져오기 (앱 시작 시 1회)
async function syncFromCloud(profileId) {
  if (!window.__fb || !window.__fb.db) return null;
  try {
    const { db, doc, getDoc } = window.__fb;
    const snap = await getDoc(doc(db, 'profiles', profileId));
    if (snap.exists()) {
      const cloudData = snap.data();
      const localRaw = localStorage.getItem(`vocab_v2_${profileId}`);
      const localData = localRaw ? JSON.parse(localRaw) : null;
      // 클라우드 데이터가 더 진행되어 있으면 클라우드 사용
      const cloudDays = Object.keys(cloudData.progress || {}).length;
      const localDays = localData ? Object.keys(localData.progress || {}).length : 0;
      if (cloudDays >= localDays) {
        localStorage.setItem(`vocab_v2_${profileId}`, JSON.stringify(cloudData));
        return cloudData;
      }
    }
  } catch (e) {
    console.warn('클라우드 동기화 실패:', e.message);
  }
  return null;
}
window.syncFromCloud = syncFromCloud;

// ============================================================
// 등급 계산 (정확히 정의된 규칙)
// ============================================================
// 일일 등급
//  🔥 챌린저: 1차 10/10 만점
// 일일 등급 (새 기준)
//  🔥 챌린저: 1·2차 중 최고점이 10점 (만점)
//  💎 다이아: 1차에 9점 (1차에 잘 본 사람)
//  ⭐ 골드:  1차 9점 미만 + 2차 9점 이상
function getDayTier(p) {
  if (!p || p.firstScore == null) return null;
  // 챌린저: 최고점 10점
  const best = Math.max(p.firstScore || 0, p.secondScore || 0);
  if (best === 10) return 'fire';
  // 다이아: 1차에 9점 (이상)
  if (p.firstScore >= 9) return 'dia';
  // 골드: 1차는 9점 미만이지만 2차에서 9점 이상
  if (p.secondScore != null && p.secondScore >= 9) return 'gold';
  return 'fail';
}

// 주간 등급 (새 기준)
//  🔥 챌린저 주차: 5일 모두 1·2차 중 최고점이 10점 (만점)
//  💎 다이아 주차: 5일 모두 1·2차 중 최고점이 9점 이상
//  ⭐ 골드 주차: 1·2차 중 잘 본 점수 합산이 (그 주 일수 × 9) 이상
function getWeekTier(state, weekNum) {
  const [start, end] = getWeekRange(weekNum);
  const totalDays = end - start + 1;
  const days = [];
  for (let d = start; d <= end; d++) {
    const p = state.progress[d];
    if (!p || p.firstScore == null) return null;
    days.push(p);
  }
  // 각 날의 최고점 (1차/2차 중 잘 본 거)
  const bestScores = days.map(d => Math.max(d.firstScore || 0, d.secondScore || 0));
  // 챌린저: 모두 최고점 10점
  if (bestScores.every(s => s === 10)) return 'fire';
  // 다이아: 모두 최고점 9점 이상
  if (bestScores.every(s => s >= 9)) return 'dia';
  // 골드: 최고점 합산
  const bestSum = bestScores.reduce((sum, s) => sum + s, 0);
  if (bestSum >= totalDays * 9) return 'gold';
  return null;
}

  gold: '⭐ 골드',

// ============================================================
// 레벨 시스템 (게임처럼 단계 올라가는 느낌)
// 한 단어당 1점, 정답률 가산점, 100점마다 레벨업
// ============================================================
function calcLevel(state) {
  // progress 기반 점수
  let score = 0;
  Object.values(state.progress).forEach(p => {
    score += (p.firstScore || 0);
    if (p.secondScore) score += Math.max(0, p.secondScore - (p.firstScore || 0));
  });
  // 토요일 보너스
  Object.values(state.saturdayBonus).forEach(b => { score += (b.score || 0); });
  // 100점마다 레벨업
  return { level: Math.max(1, Math.floor(score / 100) + 1), score, nextAt: (Math.floor(score / 100) + 1) * 100 };
}

// ============================================================
// 종합 통계 (정답률, 누적 점수, 등수, 상위 %, 이번주 진행)
// ============================================================
function getProgressInfo(state) {
  const completed = Object.keys(state.progress).length;
  const today = getTodayDay();

  // 정답률 (1차 + 2차 잘본거 합산)
  let totalCorrect = 0, totalQ = 0;
  Object.values(state.progress).forEach(p => {
    totalCorrect += Math.max(p.firstScore || 0, p.secondScore || 0);
    totalQ += 10;
  });
  // 토요일 보너스도 포함
  Object.values(state.saturdayBonus).forEach(b => {
    totalCorrect += (b.score || 0);
    totalQ += 10;
  });
  const accuracy = totalQ > 0 ? Math.round((totalCorrect / totalQ) * 100) : 0;

  // 챌린저 주차 수
  let challengerWeeks = 0, totalCompletedWeeks = 0;
  for (let w = 1; w <= 10; w++) {
    const tier = getWeekTier(state, w);
    if (tier) totalCompletedWeeks++;
    if (tier === 'fire') challengerWeeks++;
  }

  // 상위 % 계산 (정답률 + 챌린저 주차 가산점)
  let percentile = 50;
  if (accuracy >= 95) percentile = 5;
  else if (accuracy >= 90) percentile = 10;
  else if (accuracy >= 85) percentile = 18;
  else if (accuracy >= 80) percentile = 25;
  else if (accuracy >= 70) percentile = 40;
  else if (accuracy >= 60) percentile = 55;
  else percentile = 70;
  if (challengerWeeks >= 3) percentile = Math.max(3, percentile - 8);
  else if (challengerWeeks >= 1) percentile = Math.max(5, percentile - 4);

  // 이번주 진행 (월~금만)
  let weekDoneDays = 0, weekTotalDays = 5;
  if (today > 0) {
    const weekNum = getWeekNum(today);
    const [start, end] = getWeekRange(weekNum);
    weekTotalDays = end - start + 1;
    for (let d = start; d <= end; d++) {
      const p = state.progress[d];
      if (p && p.firstScore != null && (p.firstScore >= 9 || (p.secondScore != null && p.secondScore >= 9))) {
        weekDoneDays++;
      }
    }
  }

  // 누적 점수 (= 레벨 점수)
  const lvlInfo = calcLevel(state);

  return {
    completed, accuracy, totalCorrect, totalQ,
    challengerWeeks, totalCompletedWeeks,
    percentile, weekDoneDays, weekTotalDays,
    score: lvlInfo.score, level: lvlInfo.level, nextAt: lvlInfo.nextAt,
  };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// 시험 문제 생성
// 순서: 뜻고르기 4 → 스펠고르기 4 → 빈칸채우기 2
// ============================================================
function meaningsOverlap(a, b) {
  if (!a || !b) return false;
  if (a === b) return true;
  const norm = s => s.replace(/[\s()]/g, '');
  const split = s => s.split(/[,/·]/).map(p => norm(p)).filter(Boolean);
  const aP = split(a), bP = split(b);
  for (const p of aP) for (const q of bP) {
    if (p === q) return true;
    const sh = p.length <= q.length ? p : q;
    const lo = p.length <= q.length ? q : p;
    if (sh.length >= 1 && lo.startsWith(sh)) return true;
  }
  return false;
}

function genSpellingDistractors(correct, count = 4) {
  const out = new Set();
  const w = correct.toLowerCase();
  const transforms = [
    () => w.replace(/a/, 'e'),
    () => w.replace(/e/, 'a'),
    () => w.replace(/i/, 'e'),
    () => w.replace(/o/, 'u'),
    () => w.length > 4 ? w.slice(0, 2) + w.slice(3) : null,
    () => w.length > 4 ? w.slice(0, -2) + w.slice(-1) : null,
    () => {
      if (w.length < 4) return null;
      const i = Math.floor(w.length / 2);
      return w.slice(0, i) + w[i + 1] + w[i] + w.slice(i + 2);
    },
    () => w.includes('ie') ? w.replace('ie', 'ei') : null,
    () => w.includes('ei') ? w.replace('ei', 'ie') : null,
    () => w.endsWith('y') ? w.slice(0, -1) + 'ie' : null,
    () => w.endsWith('e') ? w.slice(0, -1) : null,
    () => w.includes('ou') ? w.replace('ou', 'oo') : null,
    () => {
      for (let i = 1; i < w.length - 1; i++) {
        if ('bcdfgjklmnpqrstvwxyz'.includes(w[i])) {
          return w.slice(0, i) + w[i] + w.slice(i);
        }
      }
      return null;
    },
  ];
  for (const t of transforms) {
    const v = t();
    if (v && v !== w && v.length > 1 && !out.has(v)) out.add(v);
    if (out.size >= count) break;
  }
  while (out.size < count) {
    const i = Math.floor(Math.random() * (w.length - 1)) + 1;
    const sw = w.slice(0, i - 1) + w[i] + w[i - 1] + w.slice(i + 1);
    if (sw !== w) out.add(sw); else out.add(w + 'e');
    if (out.size > 20) break;
  }
  return [...out].slice(0, count);
}

// 스펠 차이 강조 — 어떤 글자가 잘못됐는지 색깔로
function highlightDiff(wrong, correct) {
  const w = wrong.toLowerCase();
  const c = correct.toLowerCase();
  let wHtml = '', cHtml = '';
  const maxLen = Math.max(w.length, c.length);
  for (let i = 0; i < maxLen; i++) {
    const wc = w[i] || '';
    const cc = c[i] || '';
    if (wc !== cc) {
      if (wc) wHtml += `<span style="background:var(--tier-fire);color:white;padding:0 2px;border-radius:3px;">${wc}</span>`;
      if (cc) cHtml += `<span style="background:var(--green);color:white;padding:0 2px;border-radius:3px;">${cc}</span>`;
    } else {
      wHtml += wc;
      cHtml += cc;
    }
  }
  return `<span style="font-family:var(--font-eng);">${wHtml}</span> → <span style="font-family:var(--font-eng);">${cHtml}</span>`;
}

// 영어 문장 한글 해석 (간단한 패턴 매칭)
function translateSentence(sentence, answerWord, answerMeaning) {
  // 빈칸이 채워진 단어의 한글 뜻을 원래 문장에 끼워 넣어서 해석 제공
  const s = sentence.replace(/_+/g, `[${answerMeaning}]`);
  
  // 간단한 단어 사전 (자주 나오는 단어들)
  const dict = {
    'I': '나는', 'You': '너는', 'He': '그는', 'She': '그녀는', 'We': '우리는', 'They': '그들은',
    'My': '내', 'Your': '너의', 'His': '그의', 'Her': '그녀의', 'Our': '우리', 'Their': '그들의',
    'is': '이다', 'are': '이다', 'am': '이다', 'was': '였다', 'were': '였다',
    'have': '가지다', 'has': '가지다', 'had': '가졌다',
    'do': '하다', 'does': '하다', 'did': '했다',
    'will': '~할 것이다', 'can': '~할 수 있다', 'may': '~할 수 있다', 'must': '~해야 한다',
    'the': '', 'a': '', 'an': '', 'to': '~에', 'in': '~에', 'at': '~에', 'on': '~에', 'with': '~와', 'for': '~를 위해', 'from': '~로부터', 'of': '~의',
    'and': '그리고', 'but': '그러나', 'or': '또는',
    'this': '이것', 'that': '저것', 'these': '이것들', 'those': '저것들',
    'today': '오늘', 'tomorrow': '내일', 'yesterday': '어제', 'now': '지금',
    'very': '매우', 'so': '매우', 'too': '너무',
    'good': '좋은', 'bad': '나쁜', 'big': '큰', 'small': '작은',
    'please': '제발', 'thank you': '고마워', 'sorry': '미안해',
    'me': '나', 'you': '너', 'him': '그를', 'her': '그녀를', 'us': '우리를', 'them': '그들을',
    'Be': '되어라',
  };
  
  // 그냥 문장을 한글 해석 시도: 단어별 → 뜻 매칭
  // 너무 복잡한 자동 번역은 어색하니, 그냥 "주어 + [정답뜻]" 형식으로 보여줌
  const words = sentence.replace(/[.!?]/g, '').split(/\s+/).filter(w => w.length > 0);
  let parts = [];
  for (const w of words) {
    if (w.match(/^_+$/) || w === '___' || w === '_____') {
      parts.push(`<b style="color:var(--green);">${answerMeaning}</b>`);
    } else {
      const key = w.toLowerCase().replace(/[.,!?]/g, '');
      if (dict[key] !== undefined) {
        if (dict[key]) parts.push(dict[key]);
      } else {
        // 사전에 없으면 그냥 원어 표시
        parts.push(`<span style="color:var(--ink-mute);font-family:var(--font-eng);">${w}</span>`);
      }
    }
  }
  return parts.join(' ');
}

function genQuestion(word, type, allWords) {
  const pool = allWords.filter(x => x.word !== word.word);
  const distinct = pool.filter(x => !meaningsOverlap(x.meaning, word.meaning));
  const safe = distinct.length >= 4 ? distinct : pool;

  if (type === 'meaning') {
    const distractorsData = sample(safe, 3);
    const distractors = distractorsData.map(x => x.meaning);
    return {
      type, word: word.word, meaning: word.meaning,
      prompt: '뜻을 고르세요',
      display: `<div class="test-q-word">${word.word}<button class="speak-btn" onclick="speak('${word.word}', this)">🔊</button></div>`,
      options: shuffle([word.meaning, ...distractors]),
      answer: word.meaning,
      optionType: 'korean',
      typeLabel: '뜻 고르기',
      // 해설용: 각 보기가 어떤 단어의 뜻인지
      meta: { distractorWords: distractorsData },
    };
  }
  if (type === 'spelling') {
    const distractors = genSpellingDistractors(word.word, 3);
    return {
      type, word: word.word, meaning: word.meaning,
      prompt: '맞는 스펠을 고르세요',
      display: `<div class="test-q-meaning">${word.meaning}</div>`,
      options: shuffle([word.word, ...distractors]),
      answer: word.word,
      optionType: 'english',
      typeLabel: '스펠 고르기',
      meta: {},
    };
  }
  if (type === 'fill') {
    // 보기 4개 (정답 + 오답 3개) · 길이 다른 단어들로
    const wordLen = word.word.length;
    const candidates = safe.filter(x => Math.abs(x.word.length - wordLen) >= 2);
    const fillPool = candidates.length >= 3 ? candidates : safe;
    const distractorsData = sample(fillPool, 3);
    const distractors = distractorsData.map(x => x.word);
    
    // 전체 빈칸 (힌트 없음)
    const sentenceWithBlank = word.sentence.replace(/_+/g,
      '<u style="display:inline-block;min-width:80px;border-bottom:2px solid var(--coral);">&nbsp;</u>');
    
    // 정답 들어간 완성 문장
    const fullSentence = word.sentence.replace(/_+/g,
      `<b style="color:var(--green);">${word.word}</b>`);
    
    return {
      type, word: word.word, meaning: word.meaning,
      prompt: `빈칸에 알맞은 단어를 고르세요`,
      display: `<div class="test-q-sentence">${sentenceWithBlank}</div>`,
      options: shuffle([word.word, ...distractors]),
      answer: word.word,
      optionType: 'english',
      typeLabel: '빈칸 채우기',
      meta: { distractorWords: distractorsData, fullSentence, originalSentence: word.sentence },
    };
  }
}

function generateTest(words, isSecondAttempt = false, wrongWordList = []) {
  // 1차 시험: 20단어 중 10개 선택
  // 2차 시험: 1차 틀린 것 + 추가 = 10개
  let pickedWords;
  if (isSecondAttempt && wrongWordList.length > 0) {
    const wrongs = words.filter(w => wrongWordList.includes(w.word));
    const others = words.filter(w => !wrongWordList.includes(w.word));
    const need = 10 - wrongs.length;
    const extras = sample(others, Math.max(0, need));
    pickedWords = [...wrongs, ...extras].slice(0, 10);
  } else {
    pickedWords = sample(words, 10);
  }

  // 뜻 6개 + 스펠 2개 + 빈칸 2개 (스펠은 어렵고 빈칸은 길어서 적게)
  const types = ['meaning','meaning','meaning','meaning','meaning','meaning',
                 'spelling','spelling',
                 'fill','fill'];
  return pickedWords.map((w, i) => genQuestion(w, types[i], words));
}

// 토요일 보너스 시험 — 그 주 모든 단어 중 10개 (한 단어당 1문제)
function generateSaturdayTest(profileId, weekNum) {
  const [start, end] = getWeekRange(weekNum);
  const allWords = [];
  for (let d = start; d <= end; d++) {
    const dayData = WORDS[profileId][d];
    if (dayData) allWords.push(...dayData.words);
  }
  return generateTest(allWords, false, []);

let currentScreen = 'profile-select';

let testState = null;          // 현재 진행중인 시험

function navigate(screen, params = {}) {
  currentScreen = screen;
  if (screen === 'profile-select') {
    currentProfile = null;
    document.getElementById('app').innerHTML = renderProfileSelect();
    window.scrollTo(0, 0);
    return;
  }
  if (!currentProfile) currentProfile = loadState('juhyuk');

  const renderers = {
    'home': renderHome,
    'study': renderStudy,
    'test': renderTest,
    'review': renderReview,       // 제출 전 검토 화면
    'result': renderResult,
    'history': renderHistory,
    'progress': renderProgress,
    'preview': renderPreview,     // 전체 단어 미리보기
    'print': renderPrint,
    'settings': renderSettings,
    'saturday-words': renderSaturdayWords, // 토요일 그 주 단어장 펼쳐보기
    'avatar': renderAvatar, // 아바타 꾸미기
  };
  const fn = renderers[screen];
  document.getElementById('app').innerHTML = fn ? fn(params) : '<div>화면 없음</div>';
  window.scrollTo(0, 0);
}
window.navigate = navigate;

function renderStudy(params) {
  const s = currentProfile;
  const day = params.day;
  const highlightWrong = params.highlightWrong;
  const dayData = WORDS[s.profileId][day];

  if (!dayData) {
    return `<div>
      <div class="app-header">
        <button class="back-btn" onclick="navigate('home')">‹</button>
        <div class="app-title">DAY ${day}</div>
        <div style="width:38px"></div>
      </div>
      <div class="empty"><div class="empty-icon">📭</div><p>이 날의 단어가 없어요</p></div>
    </div>`;
  }

  const todayDay = getTodayDay();
  const todayProgress = s.progress[day];
  const wrongWords = todayProgress && todayProgress.wrongWords ? new Set(todayProgress.wrongWords) : new Set();

  const wordsHtml = dayData.words.map((w, i) => {
    const isWrong = highlightWrong && wrongWords.has(w.word);
    const bg = isWrong ? 'background:var(--tier-fire-soft);' : '';
    const mark = isWrong ? '<span style="color:var(--tier-fire);font-size:10px;font-weight:600;margin-left:4px;">⚠</span>' : '';
    return `
      <div class="word-item" style="${bg}">
        <span class="word-num">${i + 1}</span>
        <span class="word-eng">${w.word}</span>
        <span class="word-kor">${w.meaning}${mark}</span>
        <button class="speak-btn" onclick="speak('${w.word}', this)">🔊</button>
      </div>`;
  }).join('');

  const isToday = day === todayDay;
  const isPerfect = todayProgress && (
    (todayProgress.firstScore || 0) === 10 ||
    (todayProgress.secondScore != null && todayProgress.secondScore === 10)
  );
  const hasFirst = todayProgress && todayProgress.firstScore != null;
  const hasSecond = todayProgress && todayProgress.secondScore != null;
  const canSecond = hasFirst && !hasSecond && !isPerfect;
  const isPast = day < todayDay;
  const isFuture = day > todayDay;

  let actionHtml = '';
  
  // 시험 응시 상태판 (오늘이거나 과거인 경우만)
  let testStatusHtml = '';
  if ((isToday || isPast) && (hasFirst || hasSecond)) {
    // 1차 결과
    const firstTier = hasFirst ? (todayProgress.firstScore === 10 ? 'fire' : todayProgress.firstScore >= 9 ? 'dia' : 'fail') : null;
    const firstColor = firstTier === 'fire' ? 'var(--tier-fire)' : firstTier === 'dia' ? 'var(--tier-dia)' : firstTier === 'fail' ? 'var(--ink-soft)' : 'var(--line)';
    const firstEmoji = firstTier === 'fire' ? '🔥' : firstTier === 'dia' ? '💎' : firstTier === 'fail' ? '😢' : '';
    
    // 2차 결과
    const secondTier = hasSecond ? (todayProgress.secondScore === 10 ? 'fire' : todayProgress.secondScore >= 9 ? 'gold' : 'fail') : null;
    const secondColor = secondTier === 'fire' ? 'var(--tier-fire)' : secondTier === 'gold' ? 'var(--tier-gold)' : secondTier === 'fail' ? 'var(--ink-soft)' : 'var(--line)';
    const secondEmoji = secondTier === 'fire' ? '🔥' : secondTier === 'gold' ? '⭐' : secondTier === 'fail' ? '😢' : '';
    
    testStatusHtml = `
      <div class="card" style="margin-bottom:12px;">
        <div style="font-family:var(--font-display);font-size:14px;margin-bottom:10px;">📝 시험 응시 현황</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <!-- 1차 시험 -->
          ${hasFirst ? `
            <div style="border:2px solid ${firstColor};border-radius:var(--radius-md);padding:10px;text-align:center;background:white;">
              <div style="font-size:24px;">${firstEmoji}</div>
              <div style="font-family:var(--font-display);font-size:13px;margin-top:4px;">1차 완료</div>
              <div style="font-size:18px;font-weight:700;color:${firstColor};margin-top:2px;">${todayProgress.firstScore}/10</div>
              <button class="btn btn-sm btn-ghost mt-8" style="width:100%;font-size:11px;padding:6px;" onclick="showWrongWords(${day}, 'first')">틀린 단어 보기</button>
            </div>
          ` : `
            <div style="border:2px dashed var(--line);border-radius:var(--radius-md);padding:10px;text-align:center;color:var(--ink-mute);">
              <div style="font-size:24px;">⏳</div>
              <div style="font-family:var(--font-display);font-size:13px;margin-top:4px;">1차 미응시</div>
              ${isToday ? `<button class="btn btn-sm btn-primary mt-8" style="width:100%;font-size:11px;padding:6px;" onclick="startTest(${day}, false)">📝 1차 응시</button>` : '<div style="font-size:11px;margin-top:8px;">놓침</div>'}
            </div>
          `}
          <!-- 2차 시험 -->
          ${hasSecond ? `
            <div style="border:2px solid ${secondColor};border-radius:var(--radius-md);padding:10px;text-align:center;background:white;">
              <div style="font-size:24px;">${secondEmoji}</div>
              <div style="font-family:var(--font-display);font-size:13px;margin-top:4px;">2차 완료</div>
              <div style="font-size:18px;font-weight:700;color:${secondColor};margin-top:2px;">${todayProgress.secondScore}/10</div>
              <button class="btn btn-sm btn-ghost mt-8" style="width:100%;font-size:11px;padding:6px;" onclick="showWrongWords(${day}, 'second')">틀린 단어 보기</button>
            </div>
          ` : canSecond ? `
            <div style="border:2px solid var(--coral);border-radius:var(--radius-md);padding:10px;text-align:center;background:var(--coral-soft);">
              <div style="font-size:24px;">${todayProgress.firstScore < 9 ? '⚠️' : '🎯'}</div>
              <div style="font-family:var(--font-display);font-size:13px;margin-top:4px;">2차 가능</div>
              <div style="font-size:11px;color:var(--ink-soft);margin-top:2px;">${todayProgress.firstScore < 9 ? '만회 도전' : '만점 도전'}</div>
              <button class="btn btn-sm btn-primary mt-8" style="width:100%;font-size:11px;padding:6px;" onclick="startTest(${day}, true)">📝 2차 응시</button>
            </div>
          ` : isPerfect ? `
            <div style="border:2px solid var(--green);border-radius:var(--radius-md);padding:10px;text-align:center;background:var(--green-soft);">
              <div style="font-size:24px;">🏆</div>
              <div style="font-family:var(--font-display);font-size:13px;margin-top:4px;">만점!</div>
              <div style="font-size:11px;color:var(--green);margin-top:2px;">2차 불필요</div>
            </div>
          ` : `
            <div style="border:2px dashed var(--line);border-radius:var(--radius-md);padding:10px;text-align:center;color:var(--ink-mute);">
              <div style="font-size:24px;">—</div>
              <div style="font-family:var(--font-display);font-size:13px;margin-top:4px;">2차 종료</div>
            </div>
          `}
        </div>
      </div>`;
  }
  
  if (isToday && !hasFirst) {
    // 오늘인데 1차 안 봄 → 1차 응시
    actionHtml = `
      <button class="btn btn-block btn-primary btn-lg" onclick="startTest(${day}, false)">📝 1차 시험 응시 →</button>
      <button class="btn btn-block btn-ghost mt-8" onclick="navigate('home')">뒤로</button>`;
  } else if (isPast || isToday) {
    // 시험은 위의 상태판에서 응시. 여기서는 홈으로만
    actionHtml = `<button class="btn btn-block btn-ghost" onclick="navigate('home')">홈으로</button>`;
  } else if (isFuture) {
    actionHtml = `
      <div style="background:var(--purple-soft);border:1.5px solid var(--purple);border-radius:var(--radius-md);padding:14px;text-align:center;margin-bottom:12px;">
        <div style="font-size:13px;color:var(--purple);font-weight:600;">🔮 미리보기 모드</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">DAY ${day}이 되면 시험을 볼 수 있어요</div>
      </div>
      <button class="btn btn-block btn-ghost" onclick="navigate('home')">뒤로</button>`;
  } else {
    actionHtml = `<button class="btn btn-block btn-ghost" onclick="navigate('home')">홈으로</button>`;
  }

  return `
    <div>
      <div class="app-header">
        <button class="back-btn" onclick="navigate('home')">‹</button>
        <div class="app-title">DAY ${day} 단어</div>
        <button class="back-btn" onclick="speakAll(${day})" style="font-size:14px;">🔊</button>
      </div>
      ${testStatusHtml}
      <div class="word-list-header">
        <div class="word-day-num">DAY ${day} · ${dayData.theme}</div>
        <div class="word-day-sub">${highlightWrong ? `⚠ 1차 틀린 단어 ${wrongWords.size}개 표시 · 다시 외워봐요!` : `단어 20개 · 🔊 발음 듣기 가능`}</div>
      </div>
      <div class="word-list">${wordsHtml}</div>
      ${actionHtml}
    </div>`;
}

// 틀린 단어 보기 (1차 또는 2차)
function showWrongWords(day, attempt) {
  const s = currentProfile;
  const p = s.progress[day];
  const dayData = WORDS[s.profileId][day];
  if (!p || !dayData) return;
  const wrongList = attempt === 'first' ? p.wrongWords : p.secondWrongWords;
  if (!wrongList || wrongList.length === 0) {
    showModal(`
      <div class="modal-icon">🎉</div>
      <div class="modal-title">${attempt === 'first' ? '1차' : '2차'} 시험 만점!</div>
      <div class="modal-text">틀린 단어가 없어요!</div>
      <button class="btn btn-block btn-primary" onclick="closeModal()">확인</button>
    `);
    return;
  }
  const wrongData = wrongList.map(w => dayData.words.find(x => x.word === w)).filter(Boolean);
  const score = attempt === 'first' ? p.firstScore : p.secondScore;
  const wordsList = wrongData.map(w => `
    <div style="display:grid;grid-template-columns:1fr 1.4fr 36px;gap:8px;padding:10px 4px;border-bottom:1px solid var(--line-soft);align-items:center;">
      <span class="word-eng" style="font-size:15px;">${w.word}</span>
      <span class="word-kor">${w.meaning}</span>
      <button class="speak-btn" onclick="speak('${w.word}', this)">🔊</button>
    </div>`).join('');
  showModal(`
    <div class="modal-icon">📝</div>
    <div class="modal-title">${attempt === 'first' ? '1차' : '2차'} 틀린 단어</div>
    <div class="modal-text">${score}/10 · 틀린 단어 ${wrongData.length}개</div>
    <div style="max-height:300px;overflow-y:auto;text-align:left;border-top:1px solid var(--line);margin-top:8px;">
      ${wordsList}
    </div>
    <button class="btn btn-block btn-primary mt-12" onclick="closeModal()">확인</button>
  `);
}
window.showWrongWords = showWrongWords;

// 전체 단어 한꺼번에 발음 (한 단어씩 0.6초 간격)
function speakAll(day) {
  const s = currentProfile;
  const dayData = WORDS[s.profileId][day];
  if (!dayData) return;
  showToast('전체 단어 발음 시작', 1500);
  let i = 0;
  function next() {
    if (i >= dayData.words.length) return;
    const u = new SpeechSynthesisUtterance(dayData.words[i].word);
    u.lang = 'en-US';
    u.rate = 0.85;
    u.onend = () => { i++; setTimeout(next, 200); };
    speechSynthesis.speak(u);
  }
  speechSynthesis.cancel();
  next();
}
window.speakAll = speakAll;

// 토요일에 그 주 단어 한꺼번에 펼쳐보기
function renderSaturdayWords(params) {
  const s = currentProfile;
  const week = params.week;
  const [start, end] = getWeekRange(week);

  let html = '';
  for (let d = start; d <= end; d++) {
    const dayData = WORDS[s.profileId][d];
    if (!dayData) continue;
    const wordsHtml = dayData.words.map((w, i) => `
      <div class="word-item">
        <span class="word-num">${i + 1}</span>
        <span class="word-eng">${w.word}</span>
        <span class="word-kor">${w.meaning}</span>
        <button class="speak-btn" onclick="speak('${w.word}', this)">🔊</button>
      </div>`).join('');
    html += `
      <div class="word-list-header" style="background:linear-gradient(135deg, var(--purple), var(--blue));">
        <div class="word-day-num">DAY ${d} · ${dayData.theme}</div>
      </div>
      <div class="word-list">${wordsHtml}</div>`;
  }

  return `
    <div>
      <div class="app-header">
        <button class="back-btn" onclick="navigate('home')">‹</button>
        <div class="app-title">${week}주차 전체 단어</div>
        <div style="width:38px"></div>
      </div>
      <div class="card mb-12" style="text-align:center;background:var(--purple-soft);border-color:var(--purple);">
        <div style="font-size:13px;color:var(--purple);font-weight:600;">📚 토요일 보너스 시험 대비</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">아래 단어들 중에서 10문제가 출제돼요</div>
      </div>
      ${html}
      <button class="btn btn-block btn-primary btn-lg mt-12" onclick="startSaturdayTest(${week})">📝 보너스 시험 시작 →</button>
      <button class="btn btn-block btn-ghost mt-8" onclick="navigate('home')">뒤로</button>
    </div>`;
}

// ============================================================
// 시험 시작
// ============================================================
function startTest(day, isSecondAttempt) {
  const s = currentProfile;
  const dayData = WORDS[s.profileId][day];
  if (!dayData) return;
  
  let wrongWordList = [];
  if (isSecondAttempt) {
    const p = s.progress[day];
    if (p && p.wrongWords) wrongWordList = p.wrongWords;
  }
  
  testState = {
    type: 'daily',
    day,
    isSecondAttempt,
    questions: generateTest(dayData.words, isSecondAttempt, wrongWordList),
    answers: new Array(10).fill(null), // 사용자가 고른 답
    currentIdx: 0,
  };
  navigate('test');
}
window.startTest = startTest;

function startSaturdayTest(weekNum, isSecondAttempt = false) {
  const s = currentProfile;
  testState = {
    type: 'saturday',
    weekNum,
    isSecondAttempt,
    questions: generateSaturdayTest(s.profileId, weekNum),
    answers: new Array(10).fill(null),
    currentIdx: 0,
  };
  navigate('test');
}
window.startSaturdayTest = startSaturdayTest;

// ============================================================
// 시험 화면 (한 문제씩, 자동 채점 X, 자동 넘어가기 X)
// ============================================================
function renderTest() {
  if (!testState) { navigate('home'); return ''; }
  const t = testState;
  const q = t.questions[t.currentIdx];
  const total = t.questions.length;
  const answered = t.answers.filter(a => a !== null).length;
  const isLast = t.currentIdx === total - 1;
  const currentAnswer = t.answers[t.currentIdx];

  const titleText = t.type === 'saturday'
    ? `🎁 ${t.weekNum}주차 보너스`
    : (t.isSecondAttempt ? `📝 DAY ${t.day} 2차 시험` : `📝 DAY ${t.day} 시험`);

  // 진행 표시 점들
  let progressDots = '';
  for (let i = 0; i < total; i++) {
    let cls = 'test-progress-dot';
    if (i === t.currentIdx) cls += ' current';
    else if (t.answers[i] !== null) cls += ' answered';
    progressDots += `<div class="${cls}"></div>`;
  }

  // 옵션 버튼
  const optionsHtml = q.options.map((opt, i) => {
    const sel = currentAnswer === opt ? 'selected' : '';
    const cls = q.optionType === 'english' ? 'english' : 'korean';
    const safe = opt.replace(/'/g, "\\'");
    return `
      <div class="test-option ${sel}" onclick="selectAnswer('${safe}')">
        <div class="test-option-num">${i + 1}</div>
        <div class="test-option-text ${cls}">${opt}</div>
      </div>`;
  }).join('');

  // 하단 버튼
  let bottomBtns = '';
  if (!isLast) {
    const nextDisabled = currentAnswer === null;
    bottomBtns = `
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;">
        ${t.currentIdx > 0
          ? `<button class="btn btn-ghost" onclick="prevQuestion()">‹ 이전</button>`
          : `<div></div>`}
        <button class="btn ${nextDisabled ? 'btn-ghost' : 'btn-primary'}" onclick="nextQuestion()" ${nextDisabled ? 'disabled' : ''}>
          다음 ›
        </button>
      </div>`;
  } else {
    // 마지막 문제 — 검토 화면으로 가는 버튼
    bottomBtns = `
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;">
        <button class="btn btn-ghost" onclick="prevQuestion()">‹ 이전</button>
        <button class="btn btn-blue" onclick="navigate('review')">검토하기 ›</button>
      </div>`;
  }

  return `
    <div>
      <div class="app-header">
        <button class="back-btn" onclick="confirmExitTest()">‹</button>
        <div class="app-title">${titleText}</div>
        <div style="width:38px"></div>
      </div>
      <div class="test-meta">
        <div>${t.currentIdx + 1} / ${total} 문제</div>
        <div>답한 문제: ${answered}/${total}</div>
      </div>
      <div class="test-progress">${progressDots}</div>
      <div class="test-question">
        <div class="test-q-type">${q.typeLabel}</div>
        <div class="test-q-prompt">${q.prompt}</div>
        ${q.display}
      </div>
      <div class="test-options">${optionsHtml}</div>
      <div class="mt-12">${bottomBtns}</div>
    </div>`;
}

function selectAnswer(opt) {
  testState.answers[testState.currentIdx] = opt;
  navigate('test'); // 다시 그려서 선택 표시
}
window.selectAnswer = selectAnswer;

function nextQuestion() {
  if (testState.answers[testState.currentIdx] === null) {
    showToast('답을 선택해주세요');
    return;
  }
  if (testState.currentIdx < testState.questions.length - 1) {
    testState.currentIdx++;
    navigate('test');
  }
}
window.nextQuestion = nextQuestion;

function prevQuestion() {
  if (testState.currentIdx > 0) {
    testState.currentIdx--;
    navigate('test');
  }
}
window.prevQuestion = prevQuestion;

function jumpToQuestion(idx) {
  testState.currentIdx = idx;
  navigate('test');
}
window.jumpToQuestion = jumpToQuestion;

function confirmExitTest() {
  showModal(`
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">시험을 그만둘까요?</div>
    <div class="modal-text">지금 나가면 답이 모두 사라져요.</div>
    <button class="btn btn-block btn-primary" onclick="exitTest()">네, 나갈게요</button>
    <button class="btn btn-block btn-ghost mt-8" onclick="closeModal()">계속 풀기</button>
  `);
}
window.confirmExitTest = confirmExitTest;

function exitTest() {
  closeModal();
  testState = null;
  navigate('home');
}
window.exitTest = exitTest;

// ============================================================
// 검토 화면 — 답 모두 확인하고 수정 가능, 제출하면 그때 채점
// ============================================================
function renderReview() {
  if (!testState) { navigate('home'); return ''; }
  const t = testState;
  const total = t.questions.length;
  const unanswered = t.answers.filter(a => a === null).length;

  // 그리드: 각 문제 번호 셀 (답한 것 / 안한 것 색깔 다름)
  const cellsHtml = t.questions.map((q, i) => {
    const ans = t.answers[i];
    const cls = ans !== null ? 'answered' : 'unanswered';
    return `<div class="review-cell ${cls}" onclick="jumpToQuestion(${i})">${i + 1}</div>`;
  }).join('');

  // 답안 미리보기 리스트
  const listHtml = t.questions.map((q, i) => {
    const ans = t.answers[i];
    const ansText = ans !== null
      ? `<span style="color:var(--ink);font-weight:600;">${ans}</span>`
      : `<span style="color:var(--tier-fire);font-weight:700;">⚠ 미답</span>`;
    return `
      <div onclick="jumpToQuestion(${i})" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line-soft);cursor:pointer;">
        <div style="width:28px;height:28px;border-radius:50%;background:${ans !== null ? 'var(--coral)' : 'var(--tier-fire-soft)'};color:${ans !== null ? 'white' : 'var(--tier-fire)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;">${i + 1}</div>
        <div style="flex:1;font-size:13px;color:var(--ink-soft);">${q.typeLabel}</div>
        <div style="font-size:13px;">${ansText}</div>
        <div style="color:var(--ink-mute);">›</div>
      </div>`;
  }).join('');

  return `
    <div>
      <div class="app-header">
        <button class="back-btn" onclick="jumpToQuestion(${total - 1})">‹</button>
        <div class="app-title">검토하기</div>
        <div style="width:38px"></div>
      </div>
      <div class="card mb-12" style="text-align:center;">
        <h2 style="margin-bottom:6px;">제출하기 전 확인</h2>
        <p style="color:var(--ink-soft);font-size:13px;">번호를 누르면 그 문제로 돌아가요</p>
        ${unanswered > 0 ? `<div style="background:var(--tier-fire-soft);color:var(--tier-fire);padding:10px;border-radius:10px;margin-top:10px;font-size:13px;font-weight:600;">⚠ 안 한 문제가 ${unanswered}개 있어요!</div>` : ''}
      </div>
      <div class="card">
        <div style="font-family:var(--font-display);font-size:14px;margin-bottom:10px;">📋 문제별 답</div>
        <div class="review-grid">${cellsHtml}</div>
      </div>
      <div class="card" style="padding:0;overflow:hidden;">
        ${listHtml}
      </div>
      <div class="mt-12">
        ${unanswered > 0
          ? `<button class="btn btn-block btn-ghost btn-lg" onclick="confirmSubmitWithUnanswered()">⚠ 그래도 제출하기</button>`
          : `<button class="btn btn-block btn-green btn-lg" onclick="finishTest()">✓ 제출하기</button>`}
        <button class="btn btn-block btn-ghost mt-8" onclick="jumpToQuestion(0)">처음부터 다시 보기</button>
      </div>
    </div>`;
}

function confirmSubmitWithUnanswered() {
  const unanswered = testState.answers.filter(a => a === null).length;
  showModal(`
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">정말 제출할까요?</div>
    <div class="modal-text">아직 답하지 않은 문제가 <b>${unanswered}개</b> 있어요. 미답 문제는 0점 처리돼요.</div>
    <button class="btn btn-block btn-primary" onclick="closeModal();finishTest();">네, 제출할게요</button>
    <button class="btn btn-block btn-ghost mt-8" onclick="closeModal()">아직이요!</button>
  `);
}
window.confirmSubmitWithUnanswered = confirmSubmitWithUnanswered;

// ============================================================
// 시험 종료 — 채점 + 저장
// ============================================================
function finishTest() {
  const t = testState;
  if (!t) { navigate('home'); return; }

  // 채점
  let correct = 0;
  const wrongWords = [];
  t.questions.forEach((q, i) => {
    if (t.answers[i] === q.answer) {
      correct++;
    } else {
      wrongWords.push(q.word);
    }
  });

  const s = currentProfile;

  if (t.type === 'daily') {
    // 일일 시험 결과 저장
    const day = t.day;
    if (!s.progress[day]) s.progress[day] = {};
    if (!t.isSecondAttempt) {
      s.progress[day].firstScore = correct;
      s.progress[day].wrongWords = wrongWords;
      s.progress[day].date = new Date().toISOString();
    } else {
      s.progress[day].secondScore = correct;
      s.progress[day].secondWrongWords = wrongWords;
      s.progress[day].secondDate = new Date().toISOString();
    }

    // 등급별 보상 (코인) — 새 공식
    const tier = getDayTier(s.progress[day]);
    let coinReward = 5; // 시험 보기만 해도 5 코인
    if (tier === 'fire') coinReward = 30;
    else if (tier === 'dia') coinReward = 20;
    else if (tier === 'gold') coinReward = 10;
    s.coins += coinReward;

    // 주간 등급 체크 (마지막 날일 때)
    let weekTier = null;
    let weekCoinReward = 0;
    let weekItem = null;
    let legendaryItem = null;
    if (isWeekLastDay(day)) {
      const weekNum = getWeekNum(day);
      weekTier = getWeekTier(s, weekNum);
      if (weekTier === 'fire') weekCoinReward = 150;
      else if (weekTier === 'dia') weekCoinReward = 80;
      else if (weekTier === 'gold') weekCoinReward = 40;
      s.coins += weekCoinReward;
      
      // 등급 보상 아이템
      if (weekTier === 'fire' || weekTier === 'dia') {
        weekItem = grantTierReward(s, 'week', weekTier);
      }
      // 챌린저 3주 연속 → 전설
      if (weekTier === 'fire') {
        legendaryItem = checkLegendaryUnlock(s);
      }
    }

    saveState(s);

    if (correct >= 9) spawnConfetti(40);
    navigate('result', { correct, wrongWords, tier, weekTier, coinReward, weekCoinReward, weekItem, legendaryItem, day, questions: t.questions, userAnswers: t.answers });
  } else {
    // 토요일 보너스 — 1차/2차 지원
    const weekNum = t.weekNum;
    const satKey = `week_${weekNum}`;
    const existing = s.saturdayBonus[satKey];
    const isSecondAttempt = t.isSecondAttempt;
    
    if (!existing) {
      // 1차 시험
      s.saturdayBonus[satKey] = {
        score: correct,
        date: new Date().toISOString(),
        wrongWords,
      };
    } else if (isSecondAttempt) {
      // 2차 시험
      s.saturdayBonus[satKey].secondScore = correct;
      s.saturdayBonus[satKey].secondDate = new Date().toISOString();
      s.saturdayBonus[satKey].secondWrongWords = wrongWords;
    }
    
    // 최고점 기준 보상
    const satResult = s.saturdayBonus[satKey];
    const bestSatScore = Math.max(satResult.score || 0, satResult.secondScore || 0);
    let coinReward = 5; // 참여상
    if (correct === 10) coinReward = 50;
    else if (correct >= 9) coinReward = 30;
    else if (correct >= 7) coinReward = 15;
    s.coins += coinReward;

    saveState(s);
    if (correct >= 9) spawnConfetti(50);
    navigate('result', { correct, wrongWords, tier: null, weekTier: null, coinReward, isSaturday: true, weekNum, isSecondAttempt, questions: t.questions, userAnswers: t.answers });
  }
  testState = null;
}
window.finishTest = finishTest;

// DAY 번호 → 요일 (한 줄 도우미)
function getDayWeekday(day) {
  // 1주차: DAY 1=월, 2=화, 3=수, 4=목, 5=금
  // 2주차: DAY 6=월, 7=화, 8=수, 9=목, 10=금 ...
  const inWeek = ((day - 1) % 5);
  return ['월', '화', '수', '목', '금'][inWeek];
}

function doPrint(scope) {
  const s = currentProfile;
  let dayList;
  if (scope === 'all') {
    dayList = Object.keys(WORDS[s.profileId]).map(Number).sort((a, b) => a - b);
  } else {
    const w = parseInt(scope.replace('week', ''));
    const [start, end] = getWeekRange(w);
    dayList = [];
    for (let d = start; d <= end; d++) if (WORDS[s.profileId][d]) dayList.push(d);
  }

  const profile = PROFILES[s.profileId];
  let html = `
    <div class="print-page">
      <div class="print-cover">
        <h1 style="font-family:'Jua',sans-serif;">${profile.emoji} ${profile.name}의 영단어 도전!</h1>
        <p style="margin-top:6px;">${profile.grade} · 총 ${dayList.length}일치 · ${dayList.length * 20}단어</p>
      </div>`;
  
  dayList.forEach(d => {
    const dd = WORDS[s.profileId][d];
    const rows = dd.words.map((w, i) => `
      <tr>
        <td class="num">${i + 1}</td>
        <td class="eng">${w.word}</td>
        <td>${w.meaning}</td>
        <td class="check">☐</td>
      </tr>`).join('');
    html += `
      <div class="print-day-block">
        <div class="print-day-title">
          <span>DAY ${d} · ${dd.theme}</span>
          <span style="font-weight:400;font-size:12px;">날짜: _____ / _____</span>
        </div>
        <table class="print-word-table">${rows}</table>
      </div>`;
  });

  html += `</div>`;
  document.getElementById('print-area').innerHTML = html;
  setTimeout(() => window.print(), 100);
}
window.doPrint = doPrint;

// 아바타 렌더링 — SVG 조립해서 캐릭터 그리기
// ============================================================

function renderAvatarSVG(avatar, size = 200) {
  // avatar = { skin, hair, hairColor, top, bottom, shoes, accessories: [], background }
  const skin = SKIN_COLORS[avatar.skin || 'light'];
  const hairColor = HAIR_COLORS[avatar.hairColor || 'black'];
  const hairStyle = HAIRSTYLES[avatar.hair || 'm_short'];
  const top = TOPS[avatar.top || 'white_tee'];
  const bottom = BOTTOMS[avatar.bottom || 'jeans'];
  const shoes = SHOES[avatar.shoes || 'white_sneakers'];
  const bg = BACKGROUNDS[avatar.background || 'none'];
  const accessories = avatar.accessories || [];
  
  // 액세서리는 'aura' 슬롯이 가장 뒤(배경 직후), 'wings' 도 뒤
  const auraAcc = accessories.find(a => ACCESSORIES[a] && ACCESSORIES[a].slot === 'aura');
  const wingsAcc = accessories.find(a => ACCESSORIES[a] && ACCESSORIES[a].slot === 'wings');
  const otherAccs = accessories.filter(a => {
    const acc = ACCESSORIES[a];
    return acc && acc.slot !== 'aura' && acc.slot !== 'wings';
  });
  
  return `
  <svg viewBox="0 0 200 400" width="${size}" height="${size * 2}" xmlns="http://www.w3.org/2000/svg" style="display:block;">
    <!-- 배경 -->
    ${bg.svg()}
    
    <!-- 오라 효과 (전설) -->
    ${auraAcc ? ACCESSORIES[auraAcc].svg() : ''}
    
    <!-- 날개 (전설) -->
    ${wingsAcc ? ACCESSORIES[wingsAcc].svg() : ''}
    
    <!-- 몸통 (목, 팔) -->
    <rect x="92" y="155" width="16" height="25" fill="${skin}"/>
    <rect x="60" y="180" width="80" height="105" fill="${skin}"/>
    <rect x="50" y="200" width="15" height="80" fill="${skin}" rx="6"/>
    <rect x="135" y="200" width="15" height="80" fill="${skin}" rx="6"/>
    <circle cx="57" cy="285" r="9" fill="${skin}"/>
    <circle cx="143" cy="285" r="9" fill="${skin}"/>
    
    <!-- 다리 (피부) -->
    <rect x="80" y="280" width="18" height="60" fill="${skin}"/>
    <rect x="102" y="280" width="18" height="60" fill="${skin}"/>
    
    <!-- 하의 -->
    ${bottom.svg()}
    
    <!-- 신발 -->
    ${shoes.svg()}
    
    <!-- 상의 -->
    ${top.svg()}
    
    <!-- 머리/얼굴 (큰 원) -->
    <circle cx="100" cy="105" r="48" fill="${skin}"/>
    
    <!-- 귀 -->
    <ellipse cx="55" cy="110" rx="6" ry="10" fill="${skin}"/>
    <ellipse cx="145" cy="110" rx="6" ry="10" fill="${skin}"/>
    
    <!-- 머리스타일 -->
    ${hairStyle.svg(hairColor)}
    
    <!-- 눈 -->
    <ellipse cx="85" cy="115" rx="3.5" ry="5" fill="#2C2240"/>
    <ellipse cx="115" cy="115" rx="3.5" ry="5" fill="#2C2240"/>
    <circle cx="86" cy="113" r="1" fill="white"/>
    <circle cx="116" cy="113" r="1" fill="white"/>
    
    <!-- 코 -->
    <path d="M 100 122 L 98 130 L 102 130 Z" fill="none" stroke="${skin}" stroke-width="0" opacity="0"/>
    <ellipse cx="100" cy="128" rx="2" ry="1" fill="#E0A080"/>
    
    <!-- 입 -->
    <path d="M 92 138 Q 100 144 108 138" fill="none" stroke="#D04060" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 볼터치 -->
    <ellipse cx="78" cy="128" rx="6" ry="4" fill="#FFB0B0" opacity="0.5"/>
    <ellipse cx="122" cy="128" rx="6" ry="4" fill="#FFB0B0" opacity="0.5"/>
    
    <!-- 액세서리 (안경, 모자 등) -->
    ${otherAccs.map(a => ACCESSORIES[a] ? ACCESSORIES[a].svg() : '').join('')}
  </svg>`;
}

// 아바타 기본값
function getDefaultAvatar(profileId) {
  if (profileId === 'juhyuk') {
    return {
      skin: 'light',
      hair: 'm_short',
      hairColor: 'black',
      top: 'white_tee',
      bottom: 'jeans',
      shoes: 'white_sneakers',
      accessories: [],
      background: 'none',
    };
  } else {
    return {
      skin: 'light',
      hair: 'f_long',
      hairColor: 'brown',
      top: 'pink_tee',
      bottom: 'skirt',
      shoes: 'white_sneakers',
      accessories: [],
      background: 'none',
    };
  }
}
