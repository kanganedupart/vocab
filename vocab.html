// 아이템 등급 색상
// ============================================================
const RARITY_COLORS = {
  common:    { bg: '#F0F0F0', border: '#A0A0A0', text: '#606060', name: '일반' },
  rare:      { bg: '#DBE6FA', border: '#4A7AE8', text: '#1D7CD9', name: '레어' },
  epic:      { bg: '#E8DBFA', border: '#8E66E0', text: '#6B2E8B', name: '에픽' },
  legendary: { bg: '#FFEAC2', border: '#FFD700', text: '#B8860B', name: '전설' },
};

// ============================================================
// 옷장 화면 — 가지고 있는 거 + 미보유 (사기/잠금)
// ============================================================
function renderAvatar(params) {
  const s = currentProfile;
  if (!s.avatar) s.avatar = getDefaultAvatar(s.profileId);
  if (!s.ownedItems) s.ownedItems = ['white_tee', 'jeans', 'white_sneakers', 'pink_tee', 'skirt'];
  
  const profile = PROFILES[s.profileId];
  
  const tab = (params && params.tab) || 'closet';
  
  // 미리보기
  const preview = `
    <div style="display:flex;justify-content:center;background:linear-gradient(180deg, var(--blue-soft), white);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;border:2px solid var(--line);box-shadow:var(--shadow-soft);">
      <div style="text-align:center;">
        ${renderAvatarSVG(s.avatar, 140)}
        <div style="font-family:var(--font-display);font-size:16px;margin-top:6px;">${profile.name}의 아바타</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">🪙 ${s.coins} 코인 · Lv.${calcLevel(s).level}</div>
      </div>
    </div>`;
  
  // 탭 버튼
  const tabs = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;">
      <button class="btn ${tab === 'closet' ? 'btn-primary' : 'btn-ghost'}" onclick="navigate('avatar',{tab:'closet'})">👕 옷장</button>
      <button class="btn ${tab === 'shop' ? 'btn-primary' : 'btn-ghost'}" onclick="navigate('avatar',{tab:'shop'})">🛒 상점</button>
    </div>`;
  
  let content = '';
  if (tab === 'closet') {
    content = renderClosetTab(s);
  } else {
    content = renderShopTab(s);
  }
  
  return `
    <div>
      <div class="app-header">
        <button class="back-btn" onclick="navigate('home')">‹</button>
        <div class="app-title">아바타 꾸미기</div>
        <div style="width:38px"></div>
      </div>
      ${preview}
      ${tabs}
      ${content}
    </div>`;
}

// ============================================================
// 옷장 탭 — 보유한 아이템들로 코디
// ============================================================
function renderClosetTab(s) {
  const owned = new Set(s.ownedItems || []);
  
  const sections = [
    { key: 'hair',     label: '💇 머리',  data: HAIRSTYLES, current: s.avatar.hair, setter: 'hair', alwaysOwned: true },
    { key: 'hairColor',label: '🎨 머리색',data: HAIR_COLORS,current: s.avatar.hairColor, setter: 'hairColor', alwaysOwned: true, isColor: true },
    { key: 'skin',     label: '🤚 피부',  data: SKIN_COLORS,current: s.avatar.skin,setter: 'skin', alwaysOwned: true, isColor: true },
    { key: 'top',      label: '👕 상의',  data: TOPS,       current: s.avatar.top, setter: 'top' },
    { key: 'bottom',   label: '👖 하의',  data: BOTTOMS,    current: s.avatar.bottom, setter: 'bottom' },
    { key: 'shoes',    label: '👟 신발',  data: SHOES,      current: s.avatar.shoes, setter: 'shoes' },
    { key: 'accessories', label: '👓 액세서리', data: ACCESSORIES, current: s.avatar.accessories || [], setter: 'accessories', isMulti: true },
    { key: 'background',label:'🌅 배경', data: BACKGROUNDS, current: s.avatar.background, setter: 'background' },
  ];
  
  let html = '';
  sections.forEach(sec => {
    const items = Object.entries(sec.data);
    const ownedItems = sec.alwaysOwned ? items : items.filter(([id]) => owned.has(id));
    if (ownedItems.length === 0) return;
    
    let itemsHtml = '';
    if (sec.isColor) {
      // 색깔 동그라미로 표시
      itemsHtml = ownedItems.map(([id, color]) => {
        const sel = sec.current === id ? 'border:3px solid var(--coral);' : 'border:2px solid var(--line);';
        return `<div onclick="updateAvatar('${sec.setter}','${id}')" style="width:44px;height:44px;border-radius:50%;background:${color};cursor:pointer;${sel}box-shadow:var(--shadow-soft);"></div>`;
      }).join('');
    } else if (sec.isMulti) {
      // 액세서리 — 다중 선택, 같은 슬롯은 하나만
      itemsHtml = ownedItems.map(([id, item]) => {
        const isOn = (sec.current || []).includes(id);
        const sel = isOn ? 'border:3px solid var(--coral);background:var(--coral-soft);' : 'border:2px solid var(--line);background:white;';
        const rarity = RARITY_COLORS[item.rarity] || RARITY_COLORS.common;
        return `
          <div onclick="toggleAccessory('${id}')" style="cursor:pointer;border-radius:var(--radius-sm);padding:8px;text-align:center;${sel}">
            <div style="font-size:24px;">${id === 'none' ? '🚫' : item.svg ? '👓' : '?'}</div>
            <div style="font-size:11px;font-weight:600;margin-top:2px;">${item.name}</div>
            <div style="font-size:9px;color:${rarity.text};">${rarity.name}</div>
          </div>`;
      }).join('');
    } else {
      itemsHtml = ownedItems.map(([id, item]) => {
        const isOn = sec.current === id;
        const sel = isOn ? 'border:3px solid var(--coral);background:var(--coral-soft);' : 'border:2px solid var(--line);background:white;';
        const rarity = RARITY_COLORS[item.rarity] || RARITY_COLORS.common;
        const itemName = item.name || id;
        return `
          <div onclick="updateAvatar('${sec.setter}','${id}')" style="cursor:pointer;border-radius:var(--radius-sm);padding:8px;text-align:center;${sel}">
            <div style="font-size:24px;">${getItemEmoji(sec.key, id)}</div>
            <div style="font-size:11px;font-weight:600;margin-top:2px;">${itemName}</div>
            <div style="font-size:9px;color:${rarity.text};">${rarity.name}</div>
          </div>`;
      }).join('');
    }
    
    html += `
      <div class="card">
        <div style="font-family:var(--font-display);font-size:14px;margin-bottom:8px;">${sec.label}</div>
        <div style="display:grid;grid-template-columns:repeat(${sec.isColor ? '6' : '3'}, 1fr);gap:6px;">${itemsHtml}</div>
      </div>`;
  });
  
  return html + `<button class="btn btn-block btn-ghost mt-12" onclick="navigate('home')">홈으로</button>`;
}

// ============================================================
// 상점 탭 — 못 가진 아이템 사기
// ============================================================
function renderShopTab(s) {
  const owned = new Set(s.ownedItems || []);
  
  const sections = [
    { label: '👕 상의', data: TOPS, type: 'top' },
    { label: '👖 하의', data: BOTTOMS, type: 'bottom' },
    { label: '👟 신발', data: SHOES, type: 'shoes' },
    { label: '👓 액세서리', data: ACCESSORIES, type: 'accessories' },
    { label: '🌅 배경', data: BACKGROUNDS, type: 'background' },
  ];
  
  let html = `
    <div class="card" style="background:var(--gold-soft);border-color:var(--gold);">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="font-size:30px;">🪙</div>
        <div style="flex:1;">
          <div style="font-family:var(--font-display);font-size:16px;">${s.coins} 코인</div>
          <div style="font-size:11px;color:var(--ink-soft);">시험 1차 만점 = +30 / 다이아 = +20 / 골드 = +10</div>
        </div>
      </div>
    </div>`;
  
  sections.forEach(sec => {
    const items = Object.entries(sec.data).filter(([id]) => !owned.has(id) && id !== 'none');
    if (items.length === 0) return;
    
    const itemsHtml = items.map(([id, item]) => {
      const rarity = RARITY_COLORS[item.rarity] || RARITY_COLORS.common;
      const isLegendary = item.rarity === 'legendary';
      const cantBuy = isLegendary || s.coins < item.cost;
      
      let priceHtml;
      if (isLegendary) {
        priceHtml = `<div style="font-size:10px;color:${rarity.text};font-weight:700;">🔒 등급 달성</div>`;
      } else {
        priceHtml = `<div style="font-size:12px;font-weight:700;color:${cantBuy ? 'var(--ink-mute)' : 'var(--ink)'};">🪙 ${item.cost}</div>`;
      }
      
      return `
        <div style="border:2px solid ${rarity.border};background:${rarity.bg};border-radius:var(--radius-sm);padding:10px;text-align:center;">
          <div style="font-size:28px;">${getItemEmoji(sec.type, id)}</div>
          <div style="font-size:11px;font-weight:600;margin-top:4px;">${item.name}</div>
          <div style="font-size:9px;color:${rarity.text};margin-top:2px;font-weight:600;">${rarity.name}</div>
          <div style="margin-top:6px;">${priceHtml}</div>
          ${!isLegendary ? `
            <button class="btn btn-sm ${cantBuy ? 'btn-ghost' : 'btn-primary'} mt-8" 
              onclick="${cantBuy ? `showToast('코인이 부족해요')` : `buyItem('${id}','${sec.type}',${item.cost})`}"
              style="width:100%;font-size:11px;padding:6px;">
              ${cantBuy ? '코인 부족' : '구매'}
            </button>` : `
            <div style="margin-top:8px;font-size:10px;color:var(--ink-mute);">챌린저 3주 연속</div>`}
        </div>`;
    }).join('');
    
    html += `
      <div class="card">
        <div style="font-family:var(--font-display);font-size:14px;margin-bottom:8px;">${sec.label}</div>
        <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:8px;">${itemsHtml}</div>
      </div>`;
  });
  
  return html + `<button class="btn btn-block btn-ghost mt-12" onclick="navigate('home')">홈으로</button>`;
}

// 아이콘 이모지 (간단 표시용)
function getItemEmoji(type, id) {
  const map = {
    'hair_m_short': '💇‍♂️', 'hair_m_messy': '💇‍♂️', 'hair_m_twoblock': '💇‍♂️', 'hair_m_curly': '💇‍♂️', 'hair_m_perm': '💇‍♂️',
    'hair_f_long': '💁‍♀️', 'hair_f_short': '💁‍♀️', 'hair_f_pony': '💁‍♀️', 'hair_f_pigtail': '💁‍♀️', 'hair_f_bob': '💁‍♀️', 'hair_f_wave': '💁‍♀️', 'hair_f_braid': '💁‍♀️', 'hair_f_buns': '💁‍♀️',
  };
  if (type === 'hair') return id.startsWith('m_') ? '💇‍♂️' : '💁‍♀️';
  if (type === 'top') return '👕';
  if (type === 'bottom') return id === 'skirt' || id === 'uniform_skirt' ? '👗' : '👖';
  if (type === 'shoes') return '👟';
  if (type === 'background') return '🖼️';
  if (type === 'accessories') {
    const slot = ACCESSORIES[id]?.slot;
    if (slot === 'hat') return '🎩';
    if (slot === 'glasses') return '👓';
    if (slot === 'ears') return '🎧';
    if (slot === 'earring') return '💎';
    if (slot === 'face') return '😷';
    if (slot === 'neck') return '🧣';
    if (slot === 'wings') return '👼';
    if (slot === 'aura') return '🔥';
    return '✨';
  }
  return '?';
}

// ============================================================
// 아바타 변경 / 아이템 구매 / 액세서리 토글
// ============================================================
function updateAvatar(prop, value) {
  const s = currentProfile;
  if (!s.avatar) s.avatar = getDefaultAvatar(s.profileId);
  s.avatar[prop] = value;
  saveState(s);
  navigate('avatar', { tab: 'closet' });
}
window.updateAvatar = updateAvatar;

function toggleAccessory(id) {
  const s = currentProfile;
  if (!s.avatar) s.avatar = getDefaultAvatar(s.profileId);
  if (!s.avatar.accessories) s.avatar.accessories = [];
  
  const acc = ACCESSORIES[id];
  const idx = s.avatar.accessories.indexOf(id);
  if (idx >= 0) {
    // 빼기
    s.avatar.accessories.splice(idx, 1);
  } else {
    // 같은 슬롯에 다른 게 있으면 빼기
    s.avatar.accessories = s.avatar.accessories.filter(a => {
      const other = ACCESSORIES[a];
      return !other || other.slot !== acc.slot;
    });
    s.avatar.accessories.push(id);
  }
  saveState(s);
  navigate('avatar', { tab: 'closet' });
}
window.toggleAccessory = toggleAccessory;

function buyItem(id, type, cost) {
  const s = currentProfile;
  if (s.coins < cost) {
    showToast('코인이 부족해요');
    return;
  }
  if (!s.ownedItems) s.ownedItems = [];
  s.coins -= cost;
  s.ownedItems.push(id);
  saveState(s);
  showToast(`구매 완료! (-${cost} 🪙)`, 1500);
  spawnConfetti(20);
  navigate('avatar', { tab: 'shop' });
}
window.buyItem = buyItem;

// ============================================================
// 등급 보상으로 아이템 자동 지급
// ============================================================
function grantTierReward(state, tierType, tier) {
  // tierType: 'day' | 'week' | 'saturday'
  // tier: 'fire' | 'dia' | 'gold'
  if (!state.ownedItems) state.ownedItems = [];
  
  // 챌린저 주차 → 에픽 1개 무료
  if (tierType === 'week' && tier === 'fire') {
    const epicItems = [
      ...Object.entries(TOPS).filter(([id, x]) => x.rarity === 'epic' && !state.ownedItems.includes(id)),
      ...Object.entries(BOTTOMS).filter(([id, x]) => x.rarity === 'epic' && !state.ownedItems.includes(id)),
      ...Object.entries(SHOES).filter(([id, x]) => x.rarity === 'epic' && !state.ownedItems.includes(id)),
      ...Object.entries(ACCESSORIES).filter(([id, x]) => x.rarity === 'epic' && !state.ownedItems.includes(id)),
      ...Object.entries(BACKGROUNDS).filter(([id, x]) => x.rarity === 'epic' && !state.ownedItems.includes(id)),
    ];
    if (epicItems.length > 0) {
      const [pickedId, picked] = epicItems[Math.floor(Math.random() * epicItems.length)];
      state.ownedItems.push(pickedId);
      return { type: 'epic', name: picked.name };
    }
  }
  // 다이아 주차 → 레어 1개 무료
  if (tierType === 'week' && tier === 'dia') {
    const rareItems = [
      ...Object.entries(TOPS).filter(([id, x]) => x.rarity === 'rare' && !state.ownedItems.includes(id)),
      ...Object.entries(BOTTOMS).filter(([id, x]) => x.rarity === 'rare' && !state.ownedItems.includes(id)),
      ...Object.entries(SHOES).filter(([id, x]) => x.rarity === 'rare' && !state.ownedItems.includes(id)),
      ...Object.entries(ACCESSORIES).filter(([id, x]) => x.rarity === 'rare' && !state.ownedItems.includes(id)),
    ];
    if (rareItems.length > 0) {
      const [pickedId, picked] = rareItems[Math.floor(Math.random() * rareItems.length)];
      state.ownedItems.push(pickedId);
      return { type: 'rare', name: picked.name };
    }
  }
  return null;
}

// 챌린저 3주 연속 → 전설 1개 잠금 해제
function checkLegendaryUnlock(state) {
  // 최근 주차들 확인
  const weeks = [];
  for (let w = 1; w <= 10; w++) {
    const t = getWeekTier(state, w);
    if (t === null) break; // 아직 진행 안 한 주
    weeks.push(t);
  }
  // 마지막 3주 연속 챌린저 확인
  if (weeks.length >= 3) {
    const last3 = weeks.slice(-3);
    if (last3.every(t => t === 'fire')) {
      const legendaryItems = [
        ...Object.entries(TOPS).filter(([id, x]) => x.rarity === 'legendary' && !state.ownedItems?.includes(id)),
        ...Object.entries(ACCESSORIES).filter(([id, x]) => x.rarity === 'legendary' && !state.ownedItems?.includes(id)),
        ...Object.entries(BACKGROUNDS).filter(([id, x]) => x.rarity === 'legendary' && !state.ownedItems?.includes(id)),
      ];
      if (legendaryItems.length > 0) {
        if (!state.ownedItems) state.ownedItems = [];
        const [pickedId, picked] = legendaryItems[Math.floor(Math.random() * legendaryItems.length)];
        state.ownedItems.push(pickedId);
        return { type: 'legendary', name: picked.name };
      }
    }
  }
  return null;
}

  navigate('profile-select');
});
