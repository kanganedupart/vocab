<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📚 우리집 영단어 도전!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root {
  --bg-cream: #FFF8E8;
  --bg-card: #FFFFFF;
  --ink: #2C2240;
  --ink-soft: #6B5F8B;
  --ink-mute: #A095BB;
  --line: #E8DCC4;
  --line-soft: #F2EBD9;

  --coral: #FF6B47;
  --coral-soft: #FFE4DC;
  --teal: #2BB6A6;
  --teal-soft: #D4F1ED;
  --gold: #F5B82E;
  --gold-soft: #FFF1D0;
  --pink: #FF6B9D;
  --pink-soft: #FFE0EC;
  --blue: #4A7AE8;
  --blue-soft: #DBE6FA;
  --purple: #8E66E0;
  --purple-soft: #E8DBFA;
  --green: #4FBE52;
  --green-soft: #DDF2DE;

  --tier-fire: #E63946;
  --tier-fire-soft: #FFD8DC;
  --tier-dia: #1D7CD9;
  --tier-dia-soft: #D4E8FA;
  --tier-gold: #F5A623;
  --tier-gold-soft: #FFEAC2;

  --shadow-soft: 0 2px 0 rgba(44, 34, 64, 0.08), 0 8px 24px rgba(44, 34, 64, 0.04);
  --shadow-pop: 0 4px 0 rgba(44, 34, 64, 0.15);
  --shadow-press: 0 2px 0 rgba(44, 34, 64, 0.15);

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;

  --font-display: 'Jua', 'Black Han Sans', sans-serif;
  --font-body: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-eng: 'Fredoka', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--bg-cream);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

body {
  background:
    radial-gradient(circle at 10% 10%, var(--gold-soft) 0%, transparent 35%),
    radial-gradient(circle at 90% 90%, var(--coral-soft) 0%, transparent 35%),
    radial-gradient(circle at 90% 10%, var(--teal-soft) 0%, transparent 30%),
    var(--bg-cream);
  background-attachment: fixed;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 24px;
  position: relative;
}

/* Typography */
.display { font-family: var(--font-display); }
.eng { font-family: var(--font-eng); font-weight: 500; }

h1, h2, h3 { font-family: var(--font-display); font-weight: 400; line-height: 1.2; }
h1 { font-size: 28px; }
h2 { font-size: 22px; }
h3 { font-size: 18px; }

/* Card */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-soft);
  border: 2px solid var(--line);
}

.card-flat {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 16px;
  border: 1.5px solid var(--line);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 20px;
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  background: var(--bg-card);
  color: var(--ink);
  font-family: var(--font-display);
  font-size: 16px;
  cursor: pointer;
  box-shadow: var(--shadow-pop);
  transition: transform 0.1s, box-shadow 0.1s;
  user-select: none;
}

.btn:active {
  transform: translateY(2px);
  box-shadow: var(--shadow-press);
}

.btn-primary {
  background: var(--coral);
  color: white;
}

.btn-blue { background: var(--blue); color: white; }
.btn-pink { background: var(--pink); color: white; }
.btn-teal { background: var(--teal); color: white; }
.btn-gold { background: var(--gold); color: var(--ink); }
.btn-ghost {
  background: transparent;
  border: 1.5px solid var(--line);
  box-shadow: none;
  color: var(--ink-soft);
  font-family: var(--font-body);
  font-weight: 500;
}
.btn-ghost:active { transform: none; box-shadow: none; }

.btn-block { width: 100%; }
.btn-lg { padding: 18px 24px; font-size: 18px; }
.btn-sm { padding: 8px 14px; font-size: 14px; }

/* Pills/Badges */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-body);
}

.pill-fire { background: var(--tier-fire-soft); color: var(--tier-fire); }
.pill-dia { background: var(--tier-dia-soft); color: var(--tier-dia); }
.pill-gold { background: var(--tier-gold-soft); color: var(--tier-gold); }
.pill-coral { background: var(--coral-soft); color: var(--coral); }
.pill-teal { background: var(--teal-soft); color: var(--teal); }
.pill-blue { background: var(--blue-soft); color: var(--blue); }
.pill-pink { background: var(--pink-soft); color: var(--pink); }

/* Profile select */
.profile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 24px;
}

.profile-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 24px 16px;
  border: 2px solid var(--line);
  text-align: center;
  cursor: pointer;
  box-shadow: var(--shadow-pop);
  transition: transform 0.15s;
  position: relative;
  overflow: hidden;
}

.profile-card:active { transform: translateY(2px); }
.profile-card.juhyuk { background: linear-gradient(180deg, var(--blue-soft), white 60%); }
.profile-card.jooha { background: linear-gradient(180deg, var(--pink-soft), white 60%); }

.profile-avatar {
  width: 100px;
  height: 100px;
  margin: 0 auto 12px;
  background: var(--bg-cream);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--line);
}

.profile-name {
  font-family: var(--font-display);
  font-size: 22px;
  margin-bottom: 4px;
}

.profile-meta {
  font-size: 13px;
  color: var(--ink-soft);
}

/* Header */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding: 4px 4px;
}

.back-btn {
  background: var(--bg-card);
  border: 1.5px solid var(--line);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--ink);
  font-size: 18px;
  font-weight: 700;
}

.app-title {
  font-family: var(--font-display);
  font-size: 18px;
  flex: 1;
  text-align: center;
}

.icon-btn {
  background: var(--bg-card);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-body);
  font-weight: 600;
  color: var(--ink-soft);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* Home dashboard */
.hero {
  background: linear-gradient(180deg, white, var(--bg-cream));
  border-radius: var(--radius-lg);
  border: 2px solid var(--line);
  padding: 18px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-soft);
}

.hero-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

.hero-avatar {
  width: 90px;
  height: 90px;
  background: var(--bg-cream);
  border-radius: 50%;
  border: 2px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
}

.hero-info { flex: 1; min-width: 0; }
.hero-name { font-family: var(--font-display); font-size: 20px; }
.hero-tier { display: inline-flex; align-items: center; gap: 6px; margin-top: 4px; }
.hero-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
  font-size: 12px;
}

.stat {
  background: var(--bg-cream);
  padding: 8px;
  border-radius: var(--radius-sm);
  text-align: center;
}

.stat-label { color: var(--ink-mute); font-size: 10px; }
.stat-value { font-family: var(--font-display); font-size: 16px; margin-top: 2px; }

/* Progress bar */
.progress-section { margin-top: 12px; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.progress-bar {
  height: 12px;
  background: var(--line-soft);
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid var(--line);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--coral), var(--gold));
  border-radius: 999px;
  transition: width 0.5s;
}

/* Today action card */
.today-card {
  background: var(--coral);
  color: white;
  padding: 18px;
  border-radius: var(--radius-lg);
  margin-bottom: 14px;
  border: 2px solid var(--ink);
  box-shadow: var(--shadow-pop);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.today-card.done {
  background: var(--green);
}
.today-card.saturday {
  background: var(--gold);
  color: var(--ink);
}

.today-card-tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  opacity: 0.85;
}
.today-card-title {
  font-family: var(--font-display);
  font-size: 24px;
  margin-top: 4px;
}
.today-card-sub { font-size: 13px; margin-top: 4px; opacity: 0.9; }

.today-card .arrow {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 28px;
}

/* ========== 새 today 카드 (병렬 버튼) ========== */
.today-block {
  background: linear-gradient(135deg, #FF6B47, #F5B82E);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 14px;
  border: 2px solid var(--ink);
  box-shadow: var(--shadow-pop);
  color: white;
}

.today-block-tag {
  font-size: 11px;
  opacity: 0.9;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.today-block-title {
  font-family: var(--font-display);
  font-size: 24px;
  margin-top: 4px;
  margin-bottom: 4px;
}

.today-block-subtitle {
  font-size: 13px;
  opacity: 0.9;
  margin-bottom: 14px;
}

.today-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.today-action-btn {
  background: white;
  color: var(--ink);
  padding: 16px 10px;
  border-radius: 14px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-align: center;
  border: 2px solid white;
  transition: transform 0.1s;
}

.today-action-btn:active { transform: scale(0.96); }

.today-action-btn.urgent {
  background: var(--tier-fire);
  color: white;
  border-color: var(--tier-fire);
}

.today-action-btn.disabled {
  background: rgba(255,255,255,0.4);
  color: rgba(0,0,0,0.4);
  cursor: default;
  border-color: transparent;
}
.today-action-btn.disabled:active { transform: none; }

.today-action-icon { font-size: 30px; }
.today-action-label { font-family: var(--font-display); font-size: 14px; line-height: 1.2; }
.today-action-sub { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }

/* ========== 새 이력 (단어/시험 병렬) ========== */
.week-block {
  background: white;
  border: 2px solid var(--line);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  overflow: hidden;
}

.week-header {
  background: var(--bg-cream);
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--line-soft);
}

.week-header-title {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--ink);
}

.week-header-info {
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 600;
}

.day-row {
  display: grid;
  grid-template-columns: 56px 1fr 1.3fr;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line-soft);
  align-items: center;
}

.day-row:last-child { border-bottom: none; }

.day-row.today {
  background: linear-gradient(90deg, var(--coral-soft) 0%, transparent 80%);
}

.day-row-label {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--ink);
}

.day-row.today .day-row-label {
  color: var(--coral);
  font-weight: 600;
}

.day-cell {
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  background: var(--bg-cream);
  border: 1px solid var(--line);
  transition: transform 0.1s;
}

.day-cell:active { transform: scale(0.97); }

.day-cell.score {
  background: white;
  cursor: pointer;
  font-weight: 600;
  justify-content: space-between;
}

.day-cell.action {
  background: var(--coral);
  color: white;
  border-color: var(--coral);
  font-weight: 600;
  justify-content: center;
}

.day-cell.urgent {
  background: var(--tier-fire);
  border-color: var(--tier-fire);
  color: white;
  animation: pulse-bg 1.5s infinite;
}

.day-cell.muted {
  background: transparent;
  border: 1px dashed var(--line);
  color: var(--ink-mute);
  cursor: default;
  justify-content: center;
}

.day-cell.muted:active { transform: none; }

@keyframes pulse-bg {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.day-cell-icon { font-size: 14px; }
.day-cell-text { flex: 1; font-size: 12px; }

/* Menu grid */
.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.menu-card {
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: var(--radius-md);
  padding: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-soft);
  transition: transform 0.15s;
}

.menu-card:active { transform: translateY(1px); }
.menu-icon { font-size: 28px; }
.menu-text { font-family: var(--font-display); font-size: 14px; line-height: 1.2; }
.menu-sub { font-size: 11px; color: var(--ink-mute); margin-top: 2px; font-family: var(--font-body); }

/* Word list */
.word-list-header {
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 14px;
  text-align: center;
}

.word-day-num { font-family: var(--font-display); font-size: 32px; color: var(--coral); }
.word-day-sub { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

.word-list {
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 14px;
}

.word-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line-soft);
  gap: 8px;
}
.word-item:last-child { border-bottom: none; }

.word-num {
  font-size: 11px;
  color: var(--ink-mute);
  width: 22px;
  font-weight: 600;
}
.word-eng {
  flex: 1;
  font-family: var(--font-eng);
  font-size: 17px;
  font-weight: 500;
}
.word-kor {
  font-size: 14px;
  color: var(--ink-soft);
  text-align: right;
}

/* Test screen */
.test-progress {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  padding: 0 4px;
}

.test-progress-dot {
  flex: 1;
  height: 6px;
  background: var(--line-soft);
  border-radius: 3px;
}

.test-progress-dot.done { background: var(--teal); }
.test-progress-dot.current { background: var(--coral); }

.test-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 12px;
}

.test-question {
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 24px 20px;
  margin-bottom: 14px;
  text-align: center;
  min-height: 110px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.test-q-type {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  color: var(--coral);
  background: var(--coral-soft);
  padding: 3px 10px;
  border-radius: 999px;
  margin-bottom: 12px;
  align-self: center;
}

.test-q-prompt { font-size: 14px; color: var(--ink-soft); margin-bottom: 6px; }

.test-q-word {
  font-family: var(--font-eng);
  font-weight: 600;
  font-size: 32px;
  letter-spacing: 0.5px;
}

.test-q-sentence {
  font-family: var(--font-eng);
  font-size: 18px;
  line-height: 1.5;
  font-weight: 400;
}

.test-q-meaning {
  font-family: var(--font-display);
  font-size: 26px;
}

.test-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.test-option {
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: var(--radius-md);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.15s;
}

.test-option:active { transform: scale(0.98); }
.test-option.selected {
  border-color: var(--coral);
  background: var(--coral-soft);
}
.test-option.correct {
  border-color: var(--green);
  background: var(--green-soft);
}
.test-option.wrong {
  border-color: var(--tier-fire);
  background: var(--tier-fire-soft);
}

.test-option-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--line-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  color: var(--ink-soft);
  flex-shrink: 0;
}

.test-option.selected .test-option-num { background: var(--coral); color: white; }
.test-option.correct .test-option-num { background: var(--green); color: white; }
.test-option.wrong .test-option-num { background: var(--tier-fire); color: white; }

.test-option-text {
  flex: 1;
  font-family: var(--font-eng);
}
.test-option-text.korean { font-family: var(--font-body); font-weight: 500; }

.test-feedback {
  text-align: center;
  margin: 10px 0;
  font-family: var(--font-display);
  font-size: 18px;
  min-height: 24px;
}

.test-feedback.correct { color: var(--green); }
.test-feedback.wrong { color: var(--tier-fire); }

/* Result */
.result-hero {
  text-align: center;
  padding: 30px 20px;
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: var(--radius-lg);
  margin-bottom: 14px;
  box-shadow: var(--shadow-soft);
}

.result-emoji { font-size: 72px; margin-bottom: 8px; }
.result-score {
  font-family: var(--font-display);
  font-size: 48px;
  margin: 4px 0;
}
.result-status {
  font-family: var(--font-display);
  font-size: 24px;
}
.result-status.pass { color: var(--green); }
.result-status.fail { color: var(--tier-fire); }
.result-msg {
  font-size: 14px;
  color: var(--ink-soft);
  margin-top: 8px;
}

.result-rewards {
  background: var(--gold-soft);
  border: 2px dashed var(--gold);
  border-radius: var(--radius-md);
  padding: 14px;
  margin: 14px 0;
}
.result-rewards-title {
  font-size: 12px;
  color: var(--tier-gold);
  font-weight: 700;
  margin-bottom: 8px;
}
.reward-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 14px; }

/* Wrong words list (after test) */
.wrong-words {
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 14px;
}

.wrong-words-header {
  padding: 12px 16px;
  background: var(--coral-soft);
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--coral);
}

/* Calendar */
.cal-week {
  display: grid;
  grid-template-columns: 30px repeat(6, 1fr);

  40%, 80% { transform: translateX(8px); }

@keyframes confetti {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }

  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }

  50% { transform: translateY(-4px); }

// 스펠링 오답 자동 생성
function generateSpellingDistractors(correct, count = 4) {
  const distractors = new Set();
  const word = correct.toLowerCase();

  const transforms = [
    () => word.replace(/a/, 'e'),
    () => word.replace(/e/, 'a'),
    () => word.replace(/i/, 'e'),
    () => word.replace(/o/, 'u'),
    () => word.replace(/u/, 'o'),
    () => word.length > 4 ? word.slice(0, 2) + word.slice(3) : null,
    () => word.length > 4 ? word.slice(0, -2) + word.slice(-1) : null,
    () => {
      for (let i = 1; i < word.length - 1; i++) {
        const c = word[i];
        if ('bcdfgjklmnpqrstvwxyz'.includes(c)) {
          return word.slice(0, i) + c + word.slice(i);
        }
      }
      return null;
    },
    () => {
      if (word.length < 4) return null;
      const i = Math.floor(word.length / 2);
      return word.slice(0, i) + word[i + 1] + word[i] + word.slice(i + 2);
    },
    () => word.includes('ie') ? word.replace('ie', 'ei') : null,
    () => word.includes('ei') ? word.replace('ei', 'ie') : null,
    () => word.includes('tion') ? word.replace('tion', 'sion') : null,
    () => word.endsWith('y') ? word.slice(0, -1) + 'ie' : null,
    () => word.endsWith('e') ? word.slice(0, -1) : null,
    () => word.includes('ou') ? word.replace('ou', 'oo') : null,
    () => word.includes('ai') ? word.replace('ai', 'ia') : null,
  ];

  for (const transform of transforms) {
    const variant = transform();
    if (variant && variant !== word && variant.length > 1 && !distractors.has(variant)) {
      distractors.add(variant);
      if (distractors.size >= count) break;
    }
  }

  while (distractors.size < count) {
    const i = Math.floor(Math.random() * (word.length - 1)) + 1;
    const swapped = word.slice(0, i - 1) + word[i] + word[i - 1] + word.slice(i + 1);
    if (swapped !== word) distractors.add(swapped);
    else distractors.add(word + 'e');
    if (distractors.size > 20) break;
  }

  return [...distractors].slice(0, count);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sample(arr, n) { return shuffle(arr).slice(0, n); }

  if (isSecondAttempt && wrongIndices.length > 0) {
    const allIdx = words.map((_, i) => i);
    const others = allIdx.filter(i => !wrongIndices.includes(i));
    const need = 10 - wrongIndices.length;
    const extras = sample(others, Math.max(0, need));
    testIndices = [...wrongIndices, ...extras].slice(0, 10);
  } else {
    testIndices = sample(words.map((_, i) => i), 10);
  }

  // 순서 고정: 뜻 4 + 스펠 4 + 빈칸 2
  const types = [
    'meaning', 'meaning', 'meaning', 'meaning',
    'spelling', 'spelling', 'spelling', 'spelling',
    'fill', 'fill'
  ];

  return testIndices.map((idx, i) => generateQuestion(words[idx], types[i], words, idx));
}

// 두 한글 뜻이 헷갈릴 만큼 겹치는지 판단
// 예: "맛" vs "맛, 향" → true (헷갈림)
//     "맛" vs "맛있는" → true (의미 연관)
//     "친절한" vs "친근한" → false (글자만 비슷, 의미 다름)
function meaningsOverlap(a, b) {
  if (!a || !b) return false;
  if (a === b) return true;

  // 공백/괄호 제거
  const norm = s => s.replace(/[\s()]/g, '');
  // 쉼표/슬래시로 분리하여 부분 의미들 추출
  const splitNorm = s => s.split(/[,\/·∙]/).map(p => norm(p)).filter(Boolean);

  const aParts = splitNorm(a);
  const bParts = splitNorm(b);

  for (const p of aParts) {
    for (const q of bParts) {
      if (p === q) return true;
      // 한쪽이 다른쪽의 시작 부분이면 의미 연관 (맛 → 맛있는, 결정 → 결정하다)
      const shorter = p.length <= q.length ? p : q;
      const longer = p.length <= q.length ? q : p;
      if (shorter.length >= 1 && longer.startsWith(shorter)) return true;
    }
  }
  return false;
}

function generateQuestion(word, type, allWords, originalIdx) {
  const distractorPool = allWords.filter(w => w.word !== word.word);
  // 뜻이 헷갈리는 단어들은 distractor에서 제외 (예: taste 문제에 flavor 보기 X)
  const distinctPool = distractorPool.filter(w => !meaningsOverlap(w.meaning, word.meaning));
  // 4개 미만이면 fallback (단, 2개 이상은 보장)
  const safePool = distinctPool.length >= 4 ? distinctPool : distractorPool;

  if (type === 'meaning') {
    const distractors = sample(safePool, 4).map(w => w.meaning);
    return {
      type, originalIdx,
      display: `<div class="test-q-word">${word.word}</div>`,
      prompt: '뜻을 고르세요',
      options: shuffle([word.meaning, ...distractors]),
      answer: word.meaning,
      optionType: 'korean',
      typeLabel: '뜻 고르기',
    };
  }

  if (type === 'spelling') {
    const distractors = generateSpellingDistractors(word.word, 4);
    return {
      type, originalIdx,
      display: `<div class="test-q-meaning">${word.meaning}</div>`,
      prompt: '맞는 스펠을 고르세요',
      options: shuffle([word.word, ...distractors]),
      answer: word.word,
      optionType: 'english',
      typeLabel: '스펠 고르기',
    };
  }

  if (type === 'fill') {
    // 빈칸에는 의미 비슷한 단어가 들어가도 어색하므로 같이 걸러줌
    const distractors = sample(safePool, 4).map(w => w.word);
    const sentence = word.sentence.replace(/_+/g, '<u style="display:inline-block;min-width:60px;border-bottom:2px solid var(--coral);">&nbsp;</u>');
    return {
      type, originalIdx,
      display: `<div class="test-q-sentence">${sentence}</div>`,
      prompt: '빈칸에 알맞은 단어를 고르세요',
      options: shuffle([word.word, ...distractors]),
      answer: word.word,
      optionType: 'english',
      typeLabel: '빈칸 채우기',
    };
  }
}

// =====================================================
// 등급 계산
// =====================================================
function getTierForDay(p) {
  if (!p || p.firstScore == null) return null;
  if (p.firstScore === 10) return 'fire';
  if (p.firstScore >= 9) return 'dia';
  if (p.secondScore != null && p.secondScore >= 9) return 'gold';
  return 'fail';
}
const getTierLabel = t => ({fire:'🔥챌린저',dia:'💎다이아',gold:'⭐골드',fail:'재도전'})[t] || '';
const getTierEmoji = t => ({fire:'🔥',dia:'💎',gold:'⭐',fail:'❌'})[t] || '';

function getWeekTier(state, weekStartDay) {
  // 5일치 데이터 수집
  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = state.progress[weekStartDay + i];
    if (!d || d.firstScore == null) return null; // 한 날이라도 시험 안 봤으면 등급 없음
    days.push(d);
  }

  // 점수 추출
  const firstScores = days.map(d => d.firstScore);
  const bestScores = days.map(d => Math.max(d.firstScore || 0, d.secondScore || 0));

  // 🔥 챌린저: 5일 모두 1차 10점 만점
  if (firstScores.every(s => s === 10)) return 'fire';

  // 💎 다이아: 5일 모두 9점 이상 (1차/2차 중 높은 점수 기준)
  if (bestScores.every(s => s >= 9)) return 'dia';

  // ⭐ 골드: 5일 합산 45점 이상 (1차/2차 중 높은 점수 기준)
  const sum = bestScores.reduce((a, b) => a + b, 0);
  if (sum >= 45) return 'gold';

  return null;
}

function getProgressInfo(state) {
  const profile = PROFILES[state.profileId];
  const completed = Object.keys(state.progress).length;
  const totalDays = 120;
  const percent = Math.round((completed / totalDays) * 100);
  const currentDay = state.currentDay;
  let currentUnit = profile.units[0];
  if (currentDay > 60) currentUnit = profile.units[1];
  const unitDayInUnit = currentDay <= 60 ? currentDay : currentDay - 60;
  const unitProgress = Math.round((unitDayInUnit / 60) * 100);

  let challengerWeeks = 0, totalCompletedWeeks = 0;
  for (let week = 0; week < 24; week++) {
    const weekStart = week * 5 + 1;
    const tier = getWeekTier(state, weekStart);
    if (tier) totalCompletedWeeks++;
    if (tier === 'fire') challengerWeeks++;
  }

  const accuracy = state.totalQuestions > 0
    ? ((state.totalCorrect / state.totalQuestions) * 100).toFixed(1) : 0;

  let percentile = 50;
  if (accuracy >= 95) percentile = 10;
  else if (accuracy >= 90) percentile = 18;
  else if (accuracy >= 85) percentile = 25;
  else if (accuracy >= 75) percentile = 35;
  else if (accuracy >= 65) percentile = 50;
  else percentile = 65;
  if (challengerWeeks >= 3) percentile = Math.max(5, percentile - 8);
  else if (challengerWeeks >= 1) percentile = Math.max(8, percentile - 4);

  // 이번 주 진행 계산
  const weekStartDay = Math.floor((currentDay - 1) / 5) * 5 + 1;
  let weekDoneDays = 0;
  for (let i = 0; i < 5; i++) {
    const d = state.progress[weekStartDay + i];
    if (d && d.firstScore != null && (d.firstScore >= 9 || (d.secondScore != null && d.secondScore >= 9))) {
      weekDoneDays++;
    }
  }

  return { completed, totalDays, percent, currentUnit: currentUnit.name, unitProgress, challengerWeeks, totalCompletedWeeks, accuracy, percentile, weekDoneDays };
}

  }

  const todayProgress = s.progress[day];
  const wrongIndices = (todayProgress && todayProgress.wrongIndices) || [];
  const wrongSet = new Set(wrongIndices);

  const wordsHtml = dayData.words.map((w, i) => {

  const isToday = day === s.currentDay;

  let actionHtml = '';

  if (wordsOnly) {

    if (isToday && !alreadyPassed) {

      }
    } else {
      actionHtml = `<button class="btn btn-block btn-ghost" onclick="navigate('${backTarget}')">뒤로</button>`;
    }
  } else if (isPast) {
    actionHtml = `<button class="btn btn-block btn-ghost" onclick="navigate('${backTarget}')">뒤로</button>`;
  } else if (isFuture) {
    actionHtml = `
      <div style="background:var(--purple-soft);border:1.5px solid var(--purple);border-radius:var(--radius-md);padding:14px;text-align:center;margin-bottom:12px;">
        <div style="font-size:13px;color:var(--purple);font-weight:600;">🔮 미리보기 모드</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">DAY ${day}이 되면 시험을 볼 수 있어요</div>
      </div>
      <button class="btn btn-block btn-ghost" onclick="navigate('${backTarget}')">뒤로</button>`;
  } else if (alreadyPassed) {
    actionHtml = `
      <div style="background:var(--green-soft);border:1.5px solid var(--green);border-radius:var(--radius-md);padding:14px;text-align:center;margin-bottom:12px;">
        <div style="font-size:13px;color:var(--green);font-weight:600;">✓ 오늘 시험 완료</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">${getTierLabel(getTierForDay(todayProgress))} 등급</div>
      </div>
      <button class="btn btn-block btn-ghost" onclick="navigate('home')">집으로</button>`;
  } else if (needSecondAttempt) {
    actionHtml = `
      <button class="btn btn-block btn-primary btn-lg" onclick="startTest(${day}, true)">2차 시험 도전!</button>
      <p style="text-align:center;margin-top:10px;font-size:12px;color:var(--ink-soft);">1차 ${todayProgress.firstScore}/10 — 자정까지 도전 가능</p>`;
  } else {
    actionHtml = `
      <button class="btn btn-block btn-primary btn-lg" onclick="startTest(${day}, false)">시험 시작! ›</button>
      <p style="text-align:center;margin-top:12px;font-size:12px;color:var(--ink-soft);">10문제 · 9개 이상 맞추면 통과</p>`;
  }

  let titleText = '오늘의 단어';
  if (wordsOnly && isPast) titleText = `DAY ${day} 단어`;
  else if (wordsOnly && isFuture) titleText = `DAY ${day} 미리보기`;
  else if (wordsOnly && isToday) titleText = '오늘의 단어';
  else if (isPast) titleText = `DAY ${day} 다시보기`;
  else if (isFuture) titleText = `DAY ${day} 미리보기`;

  const headerSubtitle = highlightWrong
    ? `<span style="color:var(--tier-fire);font-weight:600;">⚠ 1차 틀린 단어 ${wrongIndices.length}개 표시</span>`
    : `${dayData.theme} · 20개 단어`;

  return `
    <div class="screen">
      <div class="app-header">
        <button class="back-btn" onclick="navigate('${backTarget}')">‹</button>
        <div class="app-title">${titleText}</div>
        <div style="width:60px"></div>
      </div>
      <div class="word-list-header">
        <div class="word-day-num">DAY ${day}</div>
        <div class="word-day-sub">${headerSubtitle}</div>
      </div>
      <div class="word-list">${wordsHtml}</div>
      ${actionHtml}
    </div>`;
}

// =====================================================
// 시험
// =====================================================
function startTest(day, isSecondAttempt) {
  const s = currentProfile;
  // 안전장치: 오늘 날짜만 시험 가능
  if (day !== s.currentDay) {
    showToast('오늘 분량만 시험 볼 수 있어요');
    return;
  }
  const dayData = WORDS[s.profileId][day];
  if (!dayData) { showToast('이 날의 단어가 없어요'); return; }
  const wrongIdx = isSecondAttempt && s.progress[day] && s.progress[day].wrongIndices ? s.progress[day].wrongIndices : [];
  testState = {
    day, isSecondAttempt,
    questions: generateTest(dayData.words, isSecondAttempt, wrongIdx),
    answers: [], currentIdx: 0, isSaturday: false,
  };
  navigate('test');
}
window.startTest = startTest;

function startSaturdayTest(week) {
  const s = currentProfile;
  // 이번주 5일치 단어 모두 모으기 (총 100개)
  const allWords = [];
  for (let i = 0; i < 5; i++) {
    const day = (week - 1) * 5 + 1 + i;
    const dayData = WORDS[s.profileId][day];
    if (dayData) allWords.push(...dayData.words);
  }
  if (allWords.length < 10) { showToast('단어가 부족해요'); return; }

  testState = {
    day: null, isSecondAttempt: false, isSaturday: true, satWeek: week,
    questions: generateTest(allWords, false, []),
    answers: [], currentIdx: 0,
  };
  navigate('test');
}
window.startSaturdayTest = startSaturdayTest;

function renderTest() {
  if (!testState) return '<div>시험을 시작해주세요</div>';
  const t = testState;
  const q = t.questions[t.currentIdx];

  const dotsHtml = t.questions.map((_, i) => {
    let cls = 'test-progress-dot';
    if (i < t.currentIdx) cls += ' done';
    if (i === t.currentIdx) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');

  const optionsHtml = q.options.map((opt, i) => `
    <div class="test-option" data-idx="${i}" onclick="selectOption(${i})">
      <div class="test-option-num">${i + 1}</div>
      <div class="test-option-text ${q.optionType === 'korean' ? 'korean' : ''}">${opt}</div>
    </div>`).join('');

  return `
    <div class="screen">
      <div class="app-header">
        <button class="back-btn" onclick="confirmExitTest()">‹</button>
        <div class="app-title">${t.isSaturday ? '🎁 토요일 보너스' : `DAY ${t.day} ${t.isSecondAttempt ? '2차' : '1차'}`}</div>
        <div style="width:38px"></div>
      </div>
      <div class="test-progress">${dotsHtml}</div>
      <div class="test-meta">
        <span>문제 ${t.currentIdx + 1} / ${t.questions.length}</span>
        <span>${q.typeLabel}</span>
      </div>
      <div class="test-question">
        <div class="test-q-type">${q.typeLabel}</div>
        <div class="test-q-prompt">${q.prompt}</div>
        ${q.display}
      </div>
      <div class="test-feedback" id="test-feedback"></div>
      <div class="test-options" id="test-options">${optionsHtml}</div>
    </div>`;
}

function confirmExitTest() {
  showModal(`
    <div class="modal-icon">🤔</div>
    <div class="modal-title">시험 그만둘까요?</div>
    <div class="modal-text">지금 그만두면 진행이 저장되지 않아요.</div>
    <button class="btn btn-block btn-primary" onclick="closeModal();testState=null;navigate('home')">네, 그만둘래요</button>
    <button class="btn btn-block btn-ghost mt-8" onclick="closeModal()">계속 시험보기</button>`);
}
window.confirmExitTest = confirmExitTest;

function selectOption(idx) {
  const t = testState;
  if (t.answered) return;
  const q = t.questions[t.currentIdx];
  const selected = q.options[idx];
  const correct = selected === q.answer;
  t.answers.push({ idx, correct, originalIdx: q.originalIdx });
  t.answered = true;

  document.querySelectorAll('.test-option').forEach((el, i) => {
    if (q.options[i] === q.answer) el.classList.add('correct');
    else if (i === idx) el.classList.add('wrong');
    el.style.pointerEvents = 'none';
  });

  const fb = document.getElementById('test-feedback');
  fb.textContent = correct ? '✓ 맞았어요!' : `✗ 정답: ${q.answer}`;
  fb.className = 'test-feedback ' + (correct ? 'correct' : 'wrong');

  setTimeout(() => {
    t.answered = false;
    t.currentIdx++;
    if (t.currentIdx >= t.questions.length) finishTest();
    else navigate('test');
  }, correct ? 700 : 1300);
}
window.selectOption = selectOption;

function finishTest() {
  const t = testState;
  const score = t.answers.filter(a => a.correct).length;
  const wrongIndices = t.answers.filter(a => !a.correct).map(a => a.originalIdx);
  const s = currentProfile;

  if (t.isSaturday) {
    const weekKey = `week_${t.satWeek}`;
    let earnedEffect = null;
    if (score >= 9) {
      const has = new Set(s.ownedEffects);
      const available = EFFECTS.filter(e => !has.has(e.id) && !e.rare);
      const rareAvailable = EFFECTS.filter(e => !has.has(e.id) && e.rare);
      const consecutive = countConsecutiveSatPass(s, t.satWeek);
      if (consecutive >= 3 && rareAvailable.length > 0) {
        earnedEffect = rareAvailable[Math.floor(Math.random() * rareAvailable.length)];
      } else if (available.length > 0) {
        earnedEffect = available[Math.floor(Math.random() * available.length)];
      } else if (rareAvailable.length > 0) {
        earnedEffect = rareAvailable[Math.floor(Math.random() * rareAvailable.length)];
      }
      if (earnedEffect) s.ownedEffects.push(earnedEffect.id);
    }
    s.saturdayBonus[weekKey] = { score, date: new Date().toISOString().slice(0, 10), effectId: earnedEffect ? earnedEffect.id : null };
    s.totalCorrect += score;
    s.totalQuestions += 10;
    saveState(s);
    navigate('result', { score, isSaturday: true, earnedEffect, week: t.satWeek });
    return;
  }

  const existing = s.progress[t.day] || {};
  if (t.isSecondAttempt) {
    existing.secondScore = score;
    existing.secondWrongIndices = wrongIndices;
  } else {
    existing.firstScore = score;
    existing.wrongIndices = wrongIndices;
    existing.words = WORDS[s.profileId][t.day].words.map(w => w.word);
  }
  existing.date = new Date().toISOString().slice(0, 10);
  existing.tier = getTierForDay(existing);
  s.progress[t.day] = existing;
  s.totalCorrect += score;
  s.totalQuestions += 10;

  let earnedItems = [], earnedCoins = 0;
  const passed = score >= 9;
  if (passed) {
    if (existing.tier === 'fire') earnedCoins = 10;
    else if (existing.tier === 'dia') earnedCoins = 6;
    else earnedCoins = 3;
    s.coins += earnedCoins;
    if (s.currentDay === t.day) s.currentDay = t.day + 1;

    const weekStart = Math.floor((t.day - 1) / 5) * 5 + 1;
    if (t.day === weekStart + 4) {
      const weekTier = getWeekTier(s, weekStart);
      if (weekTier) earnedItems = grantWeeklyReward(s, weekTier);
    }
  }

  saveState(s);
  navigate('result', {
    score, day: t.day, isSecondAttempt: t.isSecondAttempt, passed,
    tier: existing.tier, earnedCoins, earnedItems,
    weekTier: t.day % 5 === 0 ? getWeekTier(s, t.day - 4) : null,
  });
}

function countConsecutiveSatPass(state, currentWeek) {
  let count = 0;
  for (let w = currentWeek; w >= 1; w--) {
    const k = `week_${w}`;
    if (state.saturdayBonus[k] && state.saturdayBonus[k].score >= 9) count++;
    else break;
  }
  return count;
}

function grantWeeklyReward(state, weekTier) {
  const all = [...AVATAR_ITEMS.hair, ...AVATAR_ITEMS.face, ...AVATAR_ITEMS.outfit, ...AVATAR_ITEMS.accessory, ...AVATAR_ITEMS.background];
  const owned = new Set(state.ownedItems);
  const available = all.filter(item => {
    if (owned.has(item.id)) return false;
    if (weekTier === 'fire') return true;
    if (weekTier === 'dia') return item.tier !== 'fire';
    return item.tier === 'gold';
  });
  if (available.length === 0) return [];
  const granted = available[Math.floor(Math.random() * available.length)];
  state.ownedItems.push(granted.id);
  return [granted];
}

function renderResult(params) {
  const { score, day, isSecondAttempt, passed, tier, earnedCoins, earnedItems, isSaturday, earnedEffect, weekTier } = params;
  const isPass = isSaturday ? score >= 9 : (passed || (isSecondAttempt && score >= 9));
  const emoji = isPass ? (score === 10 ? '🎉' : '👏') : '😅';
  const status = isPass ? 'PASS!' : (isSecondAttempt ? 'FAIL — 내일 다시!' : '한번 더 도전!');

  let msg = '';
  if (isSaturday) msg = isPass ? '이펙트 획득 🎁' : '괜찮아요, 다음주에 또 도전!';
  else if (score === 10) msg = '완벽해요! 챌린저 등급';
  else if (passed && !isSecondAttempt) msg = '잘했어요! 다이아 등급';
  else if (isSecondAttempt && score >= 9) msg = '2차에서 통과! 골드 등급';
  else if (!isSecondAttempt) msg = '아쉬워요. 자정까지 2차 시험 도전!';
  else msg = '오늘은 여기까지. 내일 새 마음으로!';

  let rewardsHtml = '';
  if (isSaturday && earnedEffect) {
    rewardsHtml = `<div class="result-rewards"><div class="result-rewards-title">🎁 보너스 보상</div><div class="reward-row"><span>${earnedEffect.emoji} ${earnedEffect.name} ${earnedEffect.rare ? '(레어!)' : ''}</span><span style="color:var(--green);font-weight:600;">획득!</span></div></div>`;
  } else if (!isSaturday && (earnedCoins > 0 || (earnedItems && earnedItems.length))) {
    let rows = '';
    if (earnedCoins > 0) rows += `<div class="reward-row"><span>🪙 코인</span><span style="color:var(--green);font-weight:600;">+${earnedCoins}</span></div>`;
    if (earnedItems && earnedItems.length) {
      earnedItems.forEach(item => {
        rows += `<div class="reward-row"><span>🎁 ${item.name} ${item.tier === 'fire' ? '(레어!)' : ''}</span><span style="color:var(--green);font-weight:600;">획득!</span></div>`;
      });
    }
    if (weekTier) {
      const wk = ({fire:'🔥챌린저',dia:'💎다이아',gold:'⭐골드'})[weekTier];
      // 합산 점수 계산
      const weekStart = day - 4;
      let weekSum = 0;
      for (let i = 0; i < 5; i++) {
        const dp = currentProfile.progress[weekStart + i];
        if (dp) weekSum += Math.max(dp.firstScore || 0, dp.secondScore || 0);
      }
      rows += `<div class="reward-row" style="border-top:1px dashed var(--gold);margin-top:6px;padding-top:8px;"><span>🎉 이번주 등급</span><span style="font-weight:600;color:var(--coral);">${wk}</span></div>`;
      rows += `<div class="reward-row"><span style="font-size:12px;color:var(--ink-soft);">5일 합산</span><span style="font-size:12px;color:var(--ink-soft);">${weekSum}/50점</span></div>`;
    }
    rewardsHtml = `<div class="result-rewards"><div class="result-rewards-title">🎁 보상</div>${rows}</div>`;
  }

  if (isPass) setTimeout(() => spawnConfetti(score === 10 ? 50 : 30), 200);

  // 1차 실패한 경우: 틀린 단어 표시 (오답 노트)
  let wrongWordsHtml = '';
  if (!isSaturday && !isSecondAttempt && !isPass && day) {
    const dayProgress = currentProfile.progress[day];
    const wrongIndices = (dayProgress && dayProgress.wrongIndices) || [];
    const dayData = WORDS[currentProfile.profileId][day];
    if (dayData && wrongIndices.length > 0) {
      const wrongs = wrongIndices.map(i => dayData.words[i]).filter(Boolean);
      const wordsListHtml = wrongs.map(w => `
        <div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--line-soft);font-size:13px;">
          <span style="font-family:var(--font-eng);font-weight:500;">${w.word}</span>
          <span style="color:var(--ink-soft);">${w.meaning}</span>
        </div>`).join('');
      wrongWordsHtml = `
        <div style="background:white;border:2px solid var(--tier-fire-soft);border-radius:var(--radius-md);overflow:hidden;margin-bottom:12px;">
          <div style="background:var(--tier-fire-soft);padding:10px 14px;font-size:13px;color:var(--tier-fire);font-weight:600;">
            ⚠ 1차 틀린 단어 ${wrongs.length}개 — 다시 외워봐요!
          </div>
          ${wordsListHtml}
        </div>`;
    }
  }

  let actionBtn = '';
  if (isSaturday) actionBtn = `<button class="btn btn-block btn-primary btn-lg" onclick="testState=null;navigate('home')">홈으로</button>`;
  else if (!isPass && !isSecondAttempt) {
    actionBtn = `
      <button class="btn btn-block btn-primary btn-lg" onclick="testState=null;navigate('study',{day:${day},wordsOnly:true,highlightWrong:true})">📖 단어 다시 외우기 (틀린 것 표시)</button>
      <button class="btn btn-block btn-blue mt-8" onclick="testState=null;startTest(${day}, true)">📝 바로 2차 시험 보기 →</button>
      <button class="btn btn-block btn-ghost mt-8" onclick="testState=null;navigate('home')">나중에 (자정까지 가능)</button>`;
  } else actionBtn = `<button class="btn btn-block btn-primary btn-lg" onclick="testState=null;navigate('home')">홈으로</button>`;

  return `
    <div class="screen">
      <div class="result-hero pop">
        <div class="result-emoji">${emoji}</div>
        <div class="result-score">${score} <span style="color:var(--ink-mute);font-size:24px;">/ 10</span></div>
        <div class="result-status ${isPass ? 'pass' : 'fail'}">${status}</div>
        <div class="result-msg">${msg}</div>
      </div>
      ${rewardsHtml}
      ${wrongWordsHtml}
      ${actionBtn}
    </div>`;
}

function renderHistory() {
  const s = currentProfile;
  const todayDay = s.currentDay;
  const lastWeek = Math.ceil(todayDay / 5);

  // 최신 주가 위로 (역순)
  let weeksHtml = '';
  for (let w = lastWeek; w >= 1; w--) {
    const start = (w - 1) * 5 + 1;
    const weekTier = getWeekTier(s, start);

    // 합산 점수
    let weekSum = 0, weekDone = 0;
    for (let i = 0; i < 5; i++) {
      const d = s.progress[start + i];
      if (d && d.firstScore != null) {
        weekSum += Math.max(d.firstScore || 0, d.secondScore || 0);
        weekDone++;
      }
    }

    let weekInfoLabel = '';
    if (weekTier) {
      const wkLabel = ({fire:'🔥 챌린저',dia:'💎 다이아',gold:'⭐ 골드'})[weekTier];
      weekInfoLabel = `${wkLabel} · ${weekSum}/50`;
    } else if (weekDone > 0) {
      weekInfoLabel = `진행중 · ${weekDone}/5`;
    } else {
      weekInfoLabel = '아직';
    }

    let daysHtml = '';
    for (let i = 0; i < 5; i++) {
      const day = start + i;
      const p = s.progress[day];
      const isToday = day === todayDay;
      const isFuture = day > todayDay;
      const hasWords = !!WORDS[s.profileId][day];

      // 단어 셀
      let wordCell;
      if (!hasWords) {
        wordCell = `<div class="day-cell muted"><span style="font-size:11px;">단어 없음</span></div>`;
      } else if (p && p.wrongIndices && p.wrongIndices.length > 0 && p.firstScore < 9 && p.secondScore == null && isToday) {
        // 2차 필요한 오늘: 틀린 단어 강조
        wordCell = `<div class="day-cell" onclick="navigate('study',{day:${day},wordsOnly:true,highlightWrong:true})"><span class="day-cell-icon">📖</span><span class="day-cell-text">1차 틀린 단어 (${p.wrongIndices.length}개)</span></div>`;
      } else {
        wordCell = `<div class="day-cell" onclick="navigate('study',{day:${day},wordsOnly:true})"><span class="day-cell-icon">📖</span><span class="day-cell-text">단어 ${isToday ? '외우기' : '보기'}</span></div>`;
      }

      // 시험 셀
      let testCell;
      if (p && p.firstScore != null) {
        if (p.secondScore != null) {
          // 2차까지 본 케이스
          const tier = getTierForDay(p);
          const best = Math.max(p.firstScore, p.secondScore);
          testCell = `<div class="day-cell score" onclick="showDayDetail(${day})"><span>${getTierEmoji(tier)}</span><span>1차 ${p.firstScore} → 2차 ${p.secondScore}</span></div>`;
        } else if (p.firstScore >= 9) {
          // 1차 통과
          const tier = getTierForDay(p);
          testCell = `<div class="day-cell score" onclick="showDayDetail(${day})"><span>${getTierEmoji(tier)}</span><span>1차 ${p.firstScore}/10</span></div>`;
        } else if (isToday) {
          // 오늘 1차 실패 → 2차 시험 버튼
          testCell = `<div class="day-cell urgent" onclick="startTest(${day}, true)"><span class="day-cell-icon">📝</span><span class="day-cell-text">2차 시험 →</span></div>`;
        } else {
          // 과거 1차만 보고 2차 못 본 경우 (자정 지남)
          testCell = `<div class="day-cell score" style="background:#FFE4DC;" onclick="showDayDetail(${day})"><span>❌</span><span>미통과 ${p.firstScore}/10</span></div>`;
        }
      } else if (isToday) {
        // 오늘 시험 안 봄
        testCell = `<div class="day-cell action" onclick="startTest(${day}, false)"><span class="day-cell-icon">📝</span><span class="day-cell-text">시험 보기 →</span></div>`;
      } else if (isFuture) {
        testCell = `<div class="day-cell muted"><span style="font-size:11px;">아직</span></div>`;
      } else {
        // 과거인데 시험 안 봄
        testCell = `<div class="day-cell muted"><span style="font-size:11px;">스킵</span></div>`;
      }

      const rowClass = isToday ? 'day-row today' : 'day-row';
      daysHtml += `
        <div class="${rowClass}">
          <div class="day-row-label">DAY ${day}${isToday ? ' (오늘)' : ''}</div>
          ${wordCell}
          ${testCell}
        </div>`;
    }

    weeksHtml += `
      <div class="week-block">
        <div class="week-header">
          <span class="week-header-title">${w}주차</span>
          <span class="week-header-info">${weekInfoLabel}</span>
        </div>
        ${daysHtml}
      </div>`;
  }

  return `
    <div class="screen">
      <div class="app-header">
        <button class="back-btn" onclick="navigate('home')">‹</button>
        <div class="app-title">📅 이력</div>
        <div style="width:38px"></div>
      </div>
      ${weeksHtml || '<div class="empty"><div class="empty-icon">📭</div><p>아직 시험 기록이 없어요</p></div>'}
      <p style="text-align:center;font-size:11px;color:var(--ink-mute);margin-top:12px;">탭하면 단어 / 결과 자세히 보기</p>
    </div>`;
}

function renderAllDaysPreview() {
  const s = currentProfile;
  const todayDay = s.currentDay;

  let daysHtml = '';
  for (let day = 1; day <= 120; day++) {
    const dayData = WORDS[s.profileId][day];
    const hasContent = !!dayData;
    const p = s.progress[day];
    const tier = getTierForDay(p);
    const isToday = day === todayDay;
    const isPast = day < todayDay;
    const isFuture = day > todayDay;

    let badge = '';
    let bgColor = 'var(--bg-card)';
    let borderColor = 'var(--line)';
    let theme = hasContent ? dayData.theme : '아직 준비 안 됨';

    if (isPast && tier === 'fire') { badge = '🔥'; bgColor = 'var(--tier-fire-soft)'; }
    else if (isPast && tier === 'dia') { badge = '💎'; bgColor = 'var(--tier-dia-soft)'; }
    else if (isPast && tier === 'gold') { badge = '⭐'; bgColor = 'var(--tier-gold-soft)'; }
    else if (isToday) { badge = '👈 오늘'; bgColor = 'var(--coral-soft)'; borderColor = 'var(--coral)'; }
    else if (isFuture) { badge = '🔮'; }

    const clickable = hasContent;
    const opacity = hasContent ? 1 : 0.45;

    daysHtml += `
      <div onclick="${clickable ? `navigate('study',{day:${day},review:true})` : ''}" style="background:${bgColor};border:1.5px solid ${borderColor};border-radius:var(--radius-md);padding:12px 14px;cursor:${clickable ? 'pointer' : 'default'};opacity:${opacity};margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-family:var(--font-display);font-size:15px;">DAY ${day}</div>
          <div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">${theme}</div>
        </div>
        <div style="font-size:14px;${badge.includes('오늘') ? 'color:var(--coral);font-weight:600;' : ''}">${badge}</div>
      </div>`;
  }

  return `
    <div class="screen">
      <div class="app-header">
        <button class="back-btn" onclick="navigate('home')">‹</button>
        <div class="app-title">📖 전체 단어 미리보기</div>
        <div style="width:38px"></div>
      </div>
      <div class="card mb-12 text-center">

let selectedPrintWeek = null;

function renderPrintScreen() {
  const s = currentProfile;
  const todayWeek = Math.ceil(s.currentDay / 5);

  // 어떤 주가 선택되었는지 (기본: 이번주)
  const week = selectedPrintWeek || todayWeek;
  const startDay = (week - 1) * 5 + 1;
  const endDay = startDay + 4;

  // 가용한 주들 (단어가 있는)
  const availableWeeks = [];
  for (let w = 1; w <= 24; w++) {
    const sd = (w - 1) * 5 + 1;
    if (WORDS[s.profileId][sd]) availableWeeks.push(w);
  }

  const weekTabsHtml = availableWeeks.map(w => `
    <div class="cat-tab ${w === week ? 'active' : ''}" onclick="selectedPrintWeek=${w};navigate('print')">${w}주차</div>
  `).join('');

  // 미리보기 (앱 화면에 보이는 것)
  let previewHtml = '';
  for (let day = startDay; day <= endDay; day++) {
    const dayData = WORDS[s.profileId][day];
    if (!dayData) continue;
    const wordsHtml = dayData.words.map((w, i) => `
      <tr>
        <td class="num">${i + 1}</td>
        <td class="eng">${w.word}</td>
        <td>${w.meaning}</td>
        <td class="check">☐</td>
      </tr>`).join('');
    previewHtml += `
      <div class="print-day-block">
        <div class="print-day-title">
          <span>DAY ${day}</span>
          <span style="font-weight:normal;font-size:12px;">${dayData.theme}</span>
        </div>
        <table class="print-word-table">${wordsHtml}</table>
      </div>`;
  }

  return `
    <div class="screen">
      <div class="app-header">
        <button class="back-btn" onclick="navigate('home')">‹</button>
        <div class="app-title">🖨️ 인쇄하기</div>
        <div style="width:38px"></div>
      </div>

      <div class="card mb-12">
        <div style="font-size:13px;color:var(--ink-soft);">어느 주를 인쇄할까요?</div>
        <div class="cat-tabs" style="margin-top:8px;margin-bottom:0;">${weekTabsHtml}</div>
      </div>

      <button class="btn btn-block btn-primary btn-lg mb-12" onclick="doPrint(${week})">📄 인쇄/PDF 저장</button>

      <p style="text-align:center;font-size:12px;color:var(--ink-soft);margin-bottom:14px;">아래는 미리보기예요. 인쇄 누르면 깔끔하게 출력돼요.</p>

      <div class="card" style="padding:14px;">
        ${previewHtml || '<div class="empty"><div class="empty-icon">📭</div><p>이 주의 단어가 아직 없어요</p></div>'}
      </div>

      <div style="margin-top:14px;padding:14px;background:var(--blue-soft);border-radius:var(--radius-md);font-size:12px;color:var(--blue);">
        💡 <b>안드로이드/아이폰 모두 가능</b><br>
        인쇄 버튼 → "PDF로 저장" 또는 프린터 선택<br>
        체크박스(☐)는 외운 단어 표시용이에요
      </div>
    </div>`;
}

function doPrint(week) {
  const s = currentProfile;
  const profile = PROFILES[s.profileId];
  const startDay = (week - 1) * 5 + 1;
  const endDay = startDay + 4;
  const today = new Date().toISOString().slice(0, 10);

  let blocksHtml = '';
  for (let day = startDay; day <= endDay; day++) {
    const dayData = WORDS[s.profileId][day];
    if (!dayData) continue;
    const wordsHtml = dayData.words.map((w, i) => `
      <tr>
        <td class="num">${i + 1}</td>
        <td class="eng">${w.word}</td>
        <td>${w.meaning}</td>
        <td class="check">☐</td>
      </tr>`).join('');
    blocksHtml += `
      <div class="print-day-block">
        <div class="print-day-title">
          <span>DAY ${day}</span>
          <span style="font-weight:normal;font-size:12px;">${dayData.theme}</span>
        </div>
        <table class="print-word-table">${wordsHtml}</table>
      </div>`;
  }

  const printHtml = `
    <div class="print-page">
      <div class="print-cover">
        <div style="font-family:var(--font-display);font-size:24px;">📚 ${profile.name}의 영단어</div>
        <div style="font-size:14px;color:#666;margin-top:4px;">${week}주차 · DAY ${startDay}~${endDay} · 총 100단어</div>
        <div style="font-size:11px;color:#999;margin-top:4px;">출력일: ${today}</div>
      </div>
      ${blocksHtml}
      <div style="text-align:center;margin-top:20px;font-size:11px;color:#999;border-top:1px solid #ddd;padding-top:8px;">
        외운 단어는 ☐에 체크하세요 · 매일 시험 본 후 다시 점검 권장
      </div>
    </div>
  `;

  document.getElementById('print-area').innerHTML = printHtml;
  document.getElementById('print-area').style.display = 'block';
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      document.getElementById('print-area').style.display = 'none';
    }, 500);
  }, 100);
}
window.doPrint = doPrint;
